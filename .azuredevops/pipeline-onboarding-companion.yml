# =============================================================================
# Pipeline : Onboarding d'un Compagnon
# =============================================================================
# Déclencheur : Manuel
# Objectif    : Déployer une nouvelle instance de la fonction de sync
# Prérequis   : Pipeline Infra Partagée exécutée au préalable
# =============================================================================

trigger: none

# -----------------------------------------------------------------------------
# Paramètres
# -----------------------------------------------------------------------------
parameters:
  - name: environment
    displayName: '🌍 Environnement'
    type: string
    default: 'dev'
    values:
      - dev
      - nprd
      - prod

  - name: location
    displayName: '📍 Région Azure du RG compagnon'
    type: string
    default: 'francecentral'
    values:
      - francecentral
      - westeurope
      - northeurope
      - eastus
      - westus2

  - name: companionName
    displayName: '🤖 Nom du compagnon (ex: hr-assistant)'
    type: string

  - name: sharepointSiteUrl
    displayName: '🔗 URL du site SharePoint'
    type: string

  - name: sharepointDriveName
    displayName: '📂 Nom du Drive SharePoint'
    type: string
    default: 'Documents'

  - name: sharepointFolderPath
    displayName: '📁 Chemin du dossier SharePoint'
    type: string
    default: '/'

  - name: syncSchedule
    displayName: '⏰ Schedule CRON'
    type: string
    default: '0 */6 * * *'

  - name: deleteOrphanedBlobs
    displayName: '🗑️ Supprimer les blobs orphelins'
    type: boolean
    default: true

  - name: imageTag
    displayName: '🐳 Tag de l''image Docker'
    type: string
    default: 'latest'

  - name: allowSecurity
    displayName: '🔐 Vérifier le durcissement réseau (dépend de allowSecurity infra)'
    type: boolean
    default: true

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
variables:
  functionAppName: 'func-gptrusted-${{ parameters.environment }}'

  # Ressources partagées
  sharedResourceGroupName: 'rg-companion-${{ parameters.environment }}'
  networkResourceGroupName: 'rg-gptrusted-${{ parameters.environment }}'
  privateDnsResourceGroupName: 'rg-gptrusted-${{ parameters.environment }}'
  storageAccountName: 'stcompanionshared${{ parameters.environment }}'
  aiSearchName: 'srch-companion-shared-${{ parameters.environment }}'
  containerAppsEnvName: 'cae-companion-shared-${{ parameters.environment }}'
  appInsightsName: 'appi-companion-shared-${{ parameters.environment }}'

  # Ressources du compagnon (dans le même RG partagé)
  managedIdentityName: 'id-${{ parameters.companionName }}-${{ parameters.environment }}'
  containerAppName: 'ca-${{ parameters.companionName }}-sync-${{ parameters.environment }}'
  blobContainerName: '${{ parameters.companionName }}'
  aiSearchIndexName: 'idx-${{ parameters.companionName }}'
  aiSearchDataSourceName: 'ds-${{ parameters.companionName }}'
  aiSearchIndexerName: 'idxr-${{ parameters.companionName }}'

  # Foundry
  foundryName: 'aif-companion-${{ parameters.environment }}'
  projectName: 'proj-${{ parameters.companionName }}'
  companionName: '${{ parameters.companionName }}'

  # ACR
  acrName: 'acrcompanion${{ parameters.environment }}'
  imageName: 'sharepoint-sync'

  # Service Connection
  azureSubscription: 'SVC-GPTrusted_${{ upper(parameters.environment) }}'

# =============================================================================
# STAGES
# =============================================================================
stages:
  # Stage 1 : Validation
  - template: templates/stages/stage-onboarding-validation.yml
    parameters:
      azureSubscription: $(azureSubscription)
      environment: ${{ parameters.environment }}
      companionName: ${{ parameters.companionName }}
      sharedResourceGroupName: $(sharedResourceGroupName)
      storageAccountName: $(storageAccountName)
      aiSearchName: $(aiSearchName)
      containerAppsEnvName: $(containerAppsEnvName)
      appInsightsName: $(appInsightsName)
      containerAppName: $(containerAppName)
      managedIdentityName: $(managedIdentityName)
      blobContainerName: $(blobContainerName)
      aiSearchIndexName: $(aiSearchIndexName)
      acrName: $(acrName)
      imageName: $(imageName)
      imageTag: ${{ parameters.imageTag }}
      sharepointSiteUrl: ${{ parameters.sharepointSiteUrl }}
      sharepointDriveName: ${{ parameters.sharepointDriveName }}
      sharepointFolderPath: ${{ parameters.sharepointFolderPath }}
      syncSchedule: ${{ parameters.syncSchedule }}
      deleteOrphanedBlobs: ${{ parameters.deleteOrphanedBlobs }}

  # Stage 2 : Créer MSI
  - template: templates/stages/stage-create-msi.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(sharedResourceGroupName)
      managedIdentityName: $(managedIdentityName)
      environment: ${{ parameters.environment }}
      companionName: ${{ parameters.companionName }}
      dependsOn:
        - Validation

  # Stage 3 : Créer Container Blob
  - template: templates/stages/stage-create-blob-container.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(sharedResourceGroupName)
      storageAccountName: $(storageAccountName)
      containerName: $(blobContainerName)
      dependsOn:
        - Validation

  # Stage 4 : Configurer AI Search
  - template: templates/stages/stage-configure-ai-search.yml
    parameters:
      azureSubscription: $(azureSubscription)
      environment: ${{ parameters.environment }}
      resourceGroupName: $(sharedResourceGroupName)
      networkResourceGroupName: $(networkResourceGroupName)
      privateDnsResourceGroupName: $(privateDnsResourceGroupName)
      aiSearchName: $(aiSearchName)
      storageAccountName: $(storageAccountName)
      dataSourceName: $(aiSearchDataSourceName)
      indexName: $(aiSearchIndexName)
      indexerName: $(aiSearchIndexerName)
      containerName: $(blobContainerName)
      companionName: ${{ parameters.companionName }}
      dependsOn:
        - Validation
        - CreateBlobContainer

  # Stage 5 : Assigner RBAC
  - template: templates/stages/stage-assign-rbac.yml
    parameters:
      azureSubscription: $(azureSubscription)
      sharedResourceGroupName: $(sharedResourceGroupName)
      managedIdentityName: $(managedIdentityName)
      storageAccountName: $(storageAccountName)
      aiSearchName: $(aiSearchName)
      dependsOn:
        - Validation
        - CreateManagedIdentity
        - CreateBlobContainer

  # Stage 6 : Vérifier durcissement réseau partagé (optionnel)
  - ${{ if eq(parameters.allowSecurity, true) }}:
    - template: templates/stages/stage-verify-network-security.yml
      parameters:
        azureSubscription: $(azureSubscription)
        resourceGroupName: $(sharedResourceGroupName)
        networkResourceGroupName: $(networkResourceGroupName)
        privateDnsResourceGroupName: $(privateDnsResourceGroupName)
        environment: ${{ parameters.environment }}
        storageAccountName: $(storageAccountName)
        aiSearchName: $(aiSearchName)
        acrName: $(acrName)
        dependsOn:
          - Validation

  # Stage 7 : Déployer Container App
  - template: templates/stages/stage-deploy-container-app.yml
    parameters:
      azureSubscription: $(azureSubscription)
      sharedResourceGroupName: $(sharedResourceGroupName)
      containerAppName: $(containerAppName)
      containerAppsEnvName: $(containerAppsEnvName)
      managedIdentityName: $(managedIdentityName)
      appInsightsName: $(appInsightsName)
      acrName: $(acrName)
      imageName: $(imageName)
      imageTag: ${{ parameters.imageTag }}
      storageAccountName: $(storageAccountName)
      blobContainerName: $(blobContainerName)
      sharepointSiteUrl: ${{ parameters.sharepointSiteUrl }}
      sharepointDriveName: ${{ parameters.sharepointDriveName }}
      sharepointFolderPath: ${{ parameters.sharepointFolderPath }}
      syncSchedule: ${{ parameters.syncSchedule }}
      deleteOrphanedBlobs: ${{ parameters.deleteOrphanedBlobs }}
      syncPermissions: ${{ parameters.syncPermissions }}
      dependsOn:
        - Validation
        - AssignRBAC
        - ConfigureAISearch

  - template: templates/stages/stage-assign-rbac-ai-user.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(sharedResourceGroupName)
      functionAppName: '$(functionAppName)'
      targetSubscription: ''
      dependsOn:
        - Validation

  - template: templates/stages/stage-create-ai-foundry.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(sharedResourceGroupName)
      location: ${{ parameters.location }}
      foundryName: $(foundryName)
      environment: ${{ parameters.environment }}
      dependsOn:
        - Validation

  - template: templates/stages/stage-create-ai-foundry-project.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(sharedResourceGroupName)
      location: ${{ parameters.location }}
      foundryName: $(foundryName)
      projectName: $(projectName)
      environment: ${{ parameters.environment }}
      dependsOn:
        - Validation
        - CreateFoundry

  # Companions are created through an azure function since the feature is not available through az cognitiveservices account agent create for now.
  - stage: CallAzureFunction
    displayName: 'Call Azure Function'
    dependsOn:
      - Validation
      - CreateFoundry
      - CreateFoundryProject
    jobs:
      - job: CreateCompanion
        displayName: 'Valider les paramètres'
        steps:
          - powershell: |
              Write-Host "Running Powershell script"
              $url = "https://$(functionAppName).azurewebsites.net/createcompanion"
              $body = @{
                Id = "$(companionName)".ToLower().Replace(' ', '-')
                Name = "$(companionName)".ToLower().Replace(' ', '-')
                FoundryName = "$(foundryName)".ToLower().Replace(' ', '-')
                ProjectName = "$(projectName)".ToLower().Replace(' ', '-')
                Description = "Here is the description of my agent, created from Azure Function"
              } | ConvertTo-Json
              $headers = @{
                "Content-Type" = "application/json"
              }
              Write-Host "Creating companion $(companionName)"
              # Write-Host "URL: $url"
              Write-Host "Body: $body"
              Write-Host "Go to the Creation Page on the application. And fill out the form."
              # Write-Host "Running command: Invoke-RestMethod -Uri "$url" -Method POST -Body "$body" -Headers $headers -Verbose -Debug"
              # $response = Invoke-RestMethod -Uri $url -Method POST -Body $body -Headers $headers -Verbose -Debug
              # Write-Host "Companion has been created."
            displayName: 'Run Invoke-WebRequest'

  # Stage 7 : Résumé
  - template: templates/stages/stage-onboarding-summary.yml
    parameters:
      azureSubscription: $(azureSubscription)
      sharedResourceGroupName: $(sharedResourceGroupName)
      containerAppName: $(containerAppName)
      managedIdentityName: $(managedIdentityName)
      blobContainerName: $(blobContainerName)
      aiSearchIndexName: $(aiSearchIndexName)
      dataSourceName: $(aiSearchDataSourceName)
      indexerName: $(aiSearchIndexerName)
      environment: ${{ parameters.environment }}
      companionName: ${{ parameters.companionName }}
      sharepointSiteUrl: ${{ parameters.sharepointSiteUrl }}
      sharepointDriveName: ${{ parameters.sharepointDriveName }}
      sharepointFolderPath: ${{ parameters.sharepointFolderPath }}
      syncSchedule: ${{ parameters.syncSchedule }}
      deleteOrphanedBlobs: ${{ parameters.deleteOrphanedBlobs }}
      dependsOn:
        - DeployContainerApp
        - ${{ if eq(parameters.allowSecurity, true) }}:
          - ApplyCompanionSecurity