# =============================================================================
# Pipeline : Infrastructure Partagée
# =============================================================================
# Déclencheur : Manuel
# Objectif    : Créer les ressources partagées pour l'indexation
# Fréquence   : 1x par environnement
# =============================================================================

trigger: none

# -----------------------------------------------------------------------------
# Paramètres
# -----------------------------------------------------------------------------
parameters:
  - name: environment
    displayName: '🌍 Environnement'
    type: string
    default: 'dev'
    values:
      - dev
      - nprd
      - prod

  - name: location
    displayName: '📍 Région Azure'
    type: string
    default: 'francecentral'
    values:
      - francecentral
      - westeurope
      - northeurope
      - eastus
      - westus2

  - name: aiSearchSku
    displayName: '🔎 SKU Azure AI Search'
    type: string
    default: 'basic'
    values:
      - free
      - basic
      - standard
      - standard2
      - standard3

  - name: storageSku
    displayName: '💾 SKU Storage Account'
    type: string
    default: 'Standard_LRS'
    values:
      - Standard_LRS
      - Standard_GRS
      - Standard_ZRS

  - name: acrSku
    displayName: '🐳 SKU Azure Container Registry'
    type: string
    default: 'Basic'
    values:
      - Basic
      - Standard
      - Premium

  - name: allowSecurity
    displayName: '🔐 Activer le durcissement réseau en fin de pipeline'
    type: boolean
    default: true

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
variables:
  # Noms des ressources
  resourceGroupName: 'rg-companion-${{ parameters.environment }}'
  networkResourceGroupName: 'rg-gptrusted-${{ parameters.environment }}'
  privateDnsResourceGroupName: 'rg-gptrusted-${{ parameters.environment }}'
  storageAccountName: 'stcompanionshared${{ parameters.environment }}'
  aiSearchName: 'srch-companion-shared-${{ parameters.environment }}'
  containerAppsEnvName: 'cae-companion-shared-${{ parameters.environment }}'
  logAnalyticsName: 'log-companion-shared-${{ parameters.environment }}'
  appInsightsName: 'appi-companion-shared-${{ parameters.environment }}'
  acrName: 'acrcompanion${{ parameters.environment }}'

  # Service Connection
  azureSubscription: 'SVC_GPTrusted_${{ upper(parameters.environment) }}'

# =============================================================================
# STAGES
# =============================================================================
stages:
  # Stage 1 : Validation
  - stage: Validation
    displayName: '✅ Validation'
    jobs:
      - job: ValidateParams
        displayName: 'Valider les paramètres'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - bash: |
              echo "================================================"
              echo "     INFRASTRUCTURE PARTAGÉE - VALIDATION       "
              echo "================================================"
              echo ""
              echo "=== Configuration ==="
              echo "Socle partage : rg-companion-${{ parameters.environment }}"
              echo "Environnement : ${{ parameters.environment }}"
              echo "Région        : ${{ parameters.location }}"
              echo ""
              echo "=== Ressources à créer ==="
              echo "Resource Group     : $(resourceGroupName)"
              echo "Storage Account    : $(storageAccountName)"
              echo "AI Search          : $(aiSearchName)"
              echo "Container Apps Env : $(containerAppsEnvName)"
              echo "Log Analytics      : $(logAnalyticsName)"
              echo "App Insights       : $(appInsightsName)"
              echo "ACR                : $(acrName)"
              echo ""
              echo "=== SKUs ==="
              echo "AI Search : ${{ parameters.aiSearchSku }}"
              echo "Storage   : ${{ parameters.storageSku }}"
              echo "ACR       : ${{ parameters.acrSku }}"
              echo ""
              echo "=== Sécurité réseau ==="
              echo "Sécurité activée            : ${{ parameters.allowSecurity }}"
              echo "VNet Private Endpoints      : vnet-gptrusted-${{ parameters.environment }} (existant)"
              echo "Subnet Private Endpoints    : snet-companion-private-endpoints"
              echo "RG Private Endpoints/NIC    : $(networkResourceGroupName)"
              echo "RG DNS privés               : $(privateDnsResourceGroupName)"
              echo ""
            displayName: '📋 Afficher les paramètres'

  # Stage 2 : Créer Resource Group
  - template: templates/stages/stage-create-resource-group.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      environment: ${{ parameters.environment }}
      dependsOn:
        - Validation

  # Stage 3 : Créer Monitoring (Log Analytics + App Insights)
  - template: templates/stages/stage-create-monitoring.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      logAnalyticsName: $(logAnalyticsName)
      appInsightsName: $(appInsightsName)
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateResourceGroup

  # Stage 4 : Créer Storage Account
  - template: templates/stages/stage-create-storage-account.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      storageAccountName: $(storageAccountName)
      storageSku: ${{ parameters.storageSku }}
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateResourceGroup

  # Stage 5 : Créer Azure AI Search
  - template: templates/stages/stage-create-ai-search.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      aiSearchName: $(aiSearchName)
      aiSearchSku: ${{ parameters.aiSearchSku }}
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateResourceGroup

  # Stage 6 : Créer Container Apps Environment
  - template: templates/stages/stage-create-container-apps-env.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      containerAppsEnvName: $(containerAppsEnvName)
      logAnalyticsName: $(logAnalyticsName)
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateMonitoring

  # Stage 7 : Créer Azure Container Registry
  - template: templates/stages/stage-create-acr.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      acrName: $(acrName)
      acrSku: ${{ parameters.acrSku }}
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateResourceGroup

  # Stage 8 : Créer le réseau partagé (VNet + subnet Private Endpoints)
  - template: templates/stages/stage-create-network.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      location: ${{ parameters.location }}
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateResourceGroup

  # Stage 9 : Durcissement réseau optionnel
  - ${{ if eq(parameters.allowSecurity, true) }}:
    - template: templates/stages/stage-apply-network-security.yml
      parameters:
        azureSubscription: $(azureSubscription)
        resourceGroupName: $(resourceGroupName)
        networkResourceGroupName: $(networkResourceGroupName)
        privateDnsResourceGroupName: $(privateDnsResourceGroupName)
        location: ${{ parameters.location }}
        environment: ${{ parameters.environment }}
        storageAccountName: $(storageAccountName)
        aiSearchName: $(aiSearchName)
        acrName: $(acrName)
        dependsOn:
          - CreateNetwork
          - CreateStorageAccount
          - CreateAISearch
          - CreateContainerAppsEnv
          - CreateAzureContainerRegistry

  # Stage 10 : Résumé (toujours dernier)
  - template: templates/stages/stage-infra-summary.yml
    parameters:
      azureSubscription: $(azureSubscription)
      resourceGroupName: $(resourceGroupName)
      storageAccountName: $(storageAccountName)
      aiSearchName: $(aiSearchName)
      containerAppsEnvName: $(containerAppsEnvName)
      logAnalyticsName: $(logAnalyticsName)
      appInsightsName: $(appInsightsName)
      acrName: $(acrName)
      environment: ${{ parameters.environment }}
      dependsOn:
        - CreateStorageAccount
        - CreateAISearch
        - CreateContainerAppsEnv
        - CreateAzureContainerRegistry
        - ${{ if eq(parameters.allowSecurity, true) }}:
          - ApplyNetworkSecurity
