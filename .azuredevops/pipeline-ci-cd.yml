trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*'

pr:
  branches:
    include:
      - main

# ----------------------------------------------------
# Paramètres
# ----------------------------------------------------
parameters:
  - name: environment
    displayName: '🌍 Environnement'
    type: string
    default: dev
    values:
      - dev
      - nprd
      - prod

  - name: imageTag
    displayName: "Tag de l'image (laisser vide pour auto)"
    type: string
    default: ' '   # vide => auto

# ----------------------------------------------------
# Variables
# ----------------------------------------------------
variables:
  dockerfilePath: '$(Build.SourcesDirectory)/src/tools/sync-dotnet/Dockerfile'
  dockerBuildContext: '$(Build.SourcesDirectory)/src/tools/sync-dotnet'
  azureSubscription: 'SVC_GPTrusted_${{ upper(parameters.environment) }}'

# ====================================================
# STAGE
# ====================================================
stages:
- stage: Build
  displayName: '🔨 Build & Push sharepoint-sync'
  pool: gptrusted-${{ parameters.environment }}
  
  jobs:
  - job: BuildAndPush
    displayName: 'Build & Push'
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self
      displayName: '📥 Checkout'

    # 1️⃣ Calcul du tag final
    - bash: |
        TAG="${IMAGE_TAG_PARAM}"

        if [ -z "$TAG" ]; then
          echo "Paramètre imageTag vide, on regarde la source : $BUILD_SOURCEBRANCH"
          if [[ "$BUILD_SOURCEBRANCH" == refs/tags/* ]]; then
            TAG="${BUILD_SOURCEBRANCH#refs/tags/}"
            echo "Build depuis un tag Git -> TAG = $TAG"
          else
            TAG="$BUILD_SOURCEVERSION"
            echo "Build depuis une branche -> TAG = $TAG"
          fi
        else
          echo "Tag fourni en paramètre -> TAG = $TAG"
        fi

        echo "Tag final = $TAG"
        echo "##vso[task.setvariable variable=FINAL_TAG]$TAG"
      displayName: '🧮 Calcul du tag final'
      env:
        IMAGE_TAG_PARAM: ${{ parameters.imageTag }}

    # 2️⃣ Build Docker
    - task: Docker@2
      displayName: 'Docker build sharepoint-sync'
      inputs:
        repository: acrcompanion${{ parameters.environment }}.azurecr.io/sharepoint-sync
        command: build
        Dockerfile: $(dockerfilePath)
        buildContext: $(dockerBuildContext)
        tags: |
          $(FINAL_TAG)
          latest

    # 3️⃣ Push Docker
    - task: AzureCLI@2
      displayName: Docker push sharepoint-sync
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: bash
        scriptLocation: inlineScript
        failOnStandardError: true
        inlineScript: |
          IMAGE_FULL_NAME=${REGISTRY_NAME}.azurecr.io/${IMAGE_NAME}

          echo "Login à l'ACR : ${REGISTRY_NAME}"
          az acr login --name ${REGISTRY_NAME} --only-show-errors

          echo "docker push ${IMAGE_FULL_NAME}:${IMAGE_FULL_NAME}"
          docker push ${IMAGE_FULL_NAME}:${IMAGE_FULL_NAME}

          echo "docker push ${IMAGE_FULL_NAME}:latest"
          docker push ${IMAGE_FULL_NAME}:latest
      env:
        REGISTRY_NAME: acrcompanion${{ parameters.environment }}
        IMAGE_NAME: sharepoint-sync
        IMAGE_TAG: $(FINAL_TAG)