# =============================================================================
# Step Template : Vérifier DNS privé AI Search
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: networkResourceGroupName
    type: string
    default: ''
  - name: privateDnsResourceGroupName
    type: string
    default: ''
  - name: environment
    type: string
  - name: aiSearchName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '🔎 Vérifier DNS privé AI Search'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        RG="${{ parameters.resourceGroupName }}"
        NETWORK_RG="${{ parameters.networkResourceGroupName }}"
        DNS_RG="${{ parameters.privateDnsResourceGroupName }}"
        if [ -z "$NETWORK_RG" ]; then
          NETWORK_RG="$RG"
        fi
        if [ -z "$DNS_RG" ]; then
          DNS_RG="$NETWORK_RG"
        fi
        SEARCH_NAME="${{ parameters.aiSearchName }}"
        SEARCH_ZONE="privatelink.search.windows.net"

        case "${{ parameters.environment }}" in
          dev)  VNET_NAME="vnet-gptrusted-dev"  ;;
          nprd) VNET_NAME="vnet-gptrusted-nprd" ;;
          prod) VNET_NAME="vnet-gptrusted-prod" ;;
          *)    VNET_NAME="vnet-gptrusted-${{ parameters.environment }}" ;;
        esac

        echo "================================================"
        echo "    VÉRIFICATION DNS PRIVÉ AI SEARCH            "
        echo "================================================"

        VNET_COUNT=$(az network vnet list --query "length([?name=='$VNET_NAME'])" -o tsv)
        if [ "$VNET_COUNT" -eq 0 ]; then
          echo "❌ VNet '$VNET_NAME' introuvable"
          exit 1
        fi
        if [ "$VNET_COUNT" -gt 1 ]; then
          echo "❌ Plusieurs VNets nommés '$VNET_NAME' trouvés"
          exit 1
        fi

        VNET_RG=$(az network vnet list --query "[?name=='$VNET_NAME']|[0].resourceGroup" -o tsv)
        SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        VNET_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$VNET_RG/providers/Microsoft.Network/virtualNetworks/$VNET_NAME"
        PE_NAME="pe-${SEARCH_NAME}-search"

        echo "VNet cible: $VNET_NAME (RG: $VNET_RG)"

        DNS_SERVERS=$(az network vnet show \
          --resource-group "$VNET_RG" \
          --name "$VNET_NAME" \
          --query "dhcpOptions.dnsServers" -o tsv 2>/dev/null || true)

        if [ -z "$DNS_SERVERS" ]; then
          echo "✅ DNS VNet: Azure DNS par défaut"
        else
          echo "⚠️  DNS VNet custom détecté: $DNS_SERVERS"
          echo "   Vérifiez le forwarder/conditional forwarder pour '$SEARCH_ZONE'."
        fi

        ERRORS=0
        SOFT_WARNINGS=0

        ZONE_RGS=$(az network private-dns zone list \
          --query "[?name=='$SEARCH_ZONE'].resourceGroup" -o tsv 2>/dev/null || true)

        if [ -z "$ZONE_RGS" ]; then
          echo "❌ Zone DNS privée absente: $SEARCH_ZONE"
          exit 1
        fi

        if [ "$(echo "$ZONE_RGS" | sed '/^$/d' | wc -l | tr -d ' ')" -gt 1 ]; then
          if echo "$ZONE_RGS" | grep -Fxq "$DNS_RG"; then
            ZONE_RG="$DNS_RG"
            echo "⚠️  Plusieurs zones '$SEARCH_ZONE' détectées. Zone retenue: $ZONE_RG"
          else
            echo "❌ Plusieurs zones '$SEARCH_ZONE' détectées sans zone dans le RG DNS attendu '$DNS_RG'"
            echo "$ZONE_RGS"
            exit 1
          fi
        fi

        if [ -z "${ZONE_RG:-}" ]; then
          ZONE_RG=$(echo "$ZONE_RGS" | head -n 1)
        fi
        ZONE_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$ZONE_RG/providers/Microsoft.Network/privateDnsZones/$SEARCH_ZONE"

        echo "Zone retenue: $SEARCH_ZONE (RG: $ZONE_RG)"

        get_search_pe_private_ip() {
          local nic_id=""
          nic_id=$(az network private-endpoint show \
            --resource-group "$NETWORK_RG" \
            --name "$PE_NAME" \
            --query "networkInterfaces[0].id" -o tsv 2>/dev/null || true)

          if [ -z "$nic_id" ]; then
            return 1
          fi

          az network nic show \
            --ids "$nic_id" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null || true
        }

        check_and_fix_dns_record() {
          local zone_rg="$1"
          local zone_name="$2"
          local record_name="$3"
          local expected_ip="$4"
          local current_ip=""
          local add_output=""
          local add_exit=0
          local cname_target=""

          # Lit l'état actuel du record A avant toute tentative d'écriture.
          current_ip=$(az network private-dns record-set a show \
            --resource-group "$zone_rg" \
            --zone-name "$zone_name" \
            --name "$record_name" \
            --query "aRecords[0].ipv4Address" -o tsv 2>/dev/null || true)

          if [ "$current_ip" = "$expected_ip" ]; then
            echo "✅ Enregistrement A: $record_name.$zone_name -> $current_ip"
            return 0
          fi

          if [ -z "$current_ip" ]; then
            echo "⚠️  Enregistrement A manquant: $record_name.$zone_name - tentative de correction"
          else
            echo "⚠️  Enregistrement A incohérent: $record_name.$zone_name -> $current_ip (attendu: $expected_ip)"
            echo "   Tentative de correction vers l'IP attendue"
          fi

          # Supprime un éventuel CNAME homonyme qui bloquerait la création du A record.
          cname_target=$(az network private-dns record-set cname show \
            --resource-group "$zone_rg" \
            --zone-name "$zone_name" \
            --name "$record_name" \
            --query "cnameRecord.cname" -o tsv 2>/dev/null || true)

          if [ -n "$cname_target" ]; then
            echo "⚠️  Conflit détecté: CNAME existant '$record_name' -> '$cname_target'"
            echo "   Suppression du CNAME pour permettre la création du record A"
            az network private-dns record-set cname delete \
              --resource-group "$zone_rg" \
              --zone-name "$zone_name" \
              --name "$record_name" \
              --yes \
              --only-show-errors >/dev/null || true
          fi

          # Tente l'ajout du record A sans échouer immédiatement sur le code de sortie Azure CLI.
          set +e
          add_output=$(az network private-dns record-set a add-record \
            --resource-group "$zone_rg" \
            --zone-name "$zone_name" \
            --record-set-name "$record_name" \
            --ipv4-address "$expected_ip" \
            --only-show-errors 2>&1)
          add_exit=$?
          set -e

          if [ "$add_exit" -eq 0 ]; then
            echo "ℹ️  Tentative add-record réussie pour $record_name.$zone_name"
          elif echo "$add_output" | grep -Eqi "same 'ipv4Address'|already exists"; then
            echo "ℹ️  Record A déjà présent avec IP $expected_ip (idempotent)"
          else
            echo "⚠️  add-record a retourné un code non nul pour $record_name.$zone_name"
            echo "$add_output"
          fi

          # Vérifie explicitement l'état final du DNS après la tentative de correction.
          current_ip=$(az network private-dns record-set a show \
            --resource-group "$zone_rg" \
            --zone-name "$zone_name" \
            --name "$record_name" \
            --query "aRecords[0].ipv4Address" -o tsv 2>/dev/null || true)

          if [ "$current_ip" = "$expected_ip" ]; then
            echo "✅ Enregistrement A validé: $record_name.$zone_name -> $current_ip"
            return 0
          fi

          # Distingue un vrai échec DNS d'un verrou ARM transitoire pendant un move/lock RG.
          if [ "$add_exit" -ne 0 ] && echo "$add_output" | grep -Eqi "ScopeLocked|scope locked|another operation|operation.*conflict|resource group.*lock|cannot perform.*write.*lock|locked"; then
            echo "⚠️  ARM lock detected on resource group — transient state, retry after lock is released"
            return 2
          fi

          if [ -z "$current_ip" ]; then
            echo "❌ Enregistrement A absent après tentative: $record_name.$zone_name"
          else
            echo "❌ Enregistrement A incorrect après tentative: $record_name.$zone_name -> $current_ip (attendu: $expected_ip)"
          fi

          return 1
        }

        LINK_NAME=$(az network private-dns link vnet list \
          --resource-group "$ZONE_RG" \
          --zone-name "$SEARCH_ZONE" \
          --query "[?virtualNetwork.id=='$VNET_ID']|[0].name" -o tsv 2>/dev/null || true)

        if [ -z "$LINK_NAME" ]; then
          echo "⚠️  Lien VNet manquant pour '$VNET_NAME' dans '$SEARCH_ZONE' - tentative de correction"
          LINK_NAME="link-${SEARCH_ZONE//./-}"
          az network private-dns link vnet create \
            --resource-group "$ZONE_RG" \
            --zone-name "$SEARCH_ZONE" \
            --name "$LINK_NAME" \
            --virtual-network "$VNET_ID" \
            --registration-enabled false \
            --only-show-errors >/dev/null || true

          LINK_NAME=$(az network private-dns link vnet list \
            --resource-group "$ZONE_RG" \
            --zone-name "$SEARCH_ZONE" \
            --query "[?virtualNetwork.id=='$VNET_ID']|[0].name" -o tsv 2>/dev/null || true)

          if [ -z "$LINK_NAME" ]; then
            echo "❌ Impossible de créer le lien zone/VNet"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ Lien zone/VNet créé: $LINK_NAME"
          fi
        else
          echo "✅ Lien zone/VNet: $LINK_NAME"
        fi

        SEARCH_PE_IP=$(get_search_pe_private_ip || true)
        if [ -z "$SEARCH_PE_IP" ]; then
          echo "❌ Impossible de récupérer l'IP privée du Private Endpoint '$PE_NAME'"
          ERRORS=$((ERRORS + 1))
        fi

        SEARCH_A_RECORDS=$(az network private-dns record-set a show \
          --resource-group "$ZONE_RG" \
          --zone-name "$SEARCH_ZONE" \
          --name "$SEARCH_NAME" \
          --query "aRecords[0].ipv4Address" -o tsv 2>/dev/null || true)

        if [ -n "$SEARCH_PE_IP" ] && [ -z "$SEARCH_A_RECORDS" ]; then
          echo "⚠️  Enregistrement A manquant: $SEARCH_NAME.$SEARCH_ZONE - vérification du DNS zone group"

          # Vérifie que le DNS zone group du PE pointe bien vers la zone Search retenue.
          DNS_ZONE_IDS=$(az network private-endpoint dns-zone-group show \
            --resource-group "$NETWORK_RG" \
            --endpoint-name "$PE_NAME" \
            --name "default" \
            --query "privateDnsZoneConfigs[].privateDnsZoneId" -o tsv 2>/dev/null || true)

          if ! echo "$DNS_ZONE_IDS" | grep -Fq "$ZONE_ID"; then
            echo "⚠️  DNS zone group du PE incohérent - recréation"
            az network private-endpoint dns-zone-group delete \
              --resource-group "$NETWORK_RG" \
              --endpoint-name "$PE_NAME" \
              --name "default" \
              --only-show-errors >/dev/null 2>&1 || true

            az network private-endpoint dns-zone-group create \
              --resource-group "$NETWORK_RG" \
              --endpoint-name "$PE_NAME" \
              --name "default" \
              --private-dns-zone "$ZONE_ID" \
              --zone-name "default" \
              --only-show-errors >/dev/null

            # La création des enregistrements DNS via zone-group peut être asynchrone.
            for i in $(seq 1 12); do
              SEARCH_A_RECORDS=$(az network private-dns record-set a show \
                --resource-group "$ZONE_RG" \
                --zone-name "$SEARCH_ZONE" \
                --name "$SEARCH_NAME" \
                --query "aRecords[0].ipv4Address" -o tsv 2>/dev/null || true)
              if [ -n "$SEARCH_A_RECORDS" ]; then
                break
              fi
              sleep 5
            done
          fi
        fi

        if [ -n "$SEARCH_PE_IP" ]; then
          set +e
          check_and_fix_dns_record "$ZONE_RG" "$SEARCH_ZONE" "$SEARCH_NAME" "$SEARCH_PE_IP"
          DNS_RECORD_STATUS=$?
          set -e

          if [ "$DNS_RECORD_STATUS" -eq 1 ]; then
            ERRORS=$((ERRORS + 1))
          elif [ "$DNS_RECORD_STATUS" -eq 2 ]; then
            SOFT_WARNINGS=$((SOFT_WARNINGS + 1))
            echo "⚠️  Vérification DNS privé AI Search en état transitoire"
          fi
        fi

        if [ "$ERRORS" -gt 0 ]; then
          echo "❌ Vérification DNS privé AI Search KO ($ERRORS erreur(s))"
          exit 1
        fi

        if [ "$SOFT_WARNINGS" -gt 0 ]; then
          echo "⚠️  Vérification DNS privé AI Search en état transitoire ($SOFT_WARNINGS avertissement(s))"
          exit 0
        fi

        echo "✅ Vérification DNS privé AI Search OK"
