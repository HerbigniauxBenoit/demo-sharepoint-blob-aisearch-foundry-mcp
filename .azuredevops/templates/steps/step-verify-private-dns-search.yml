# =============================================================================
# Step Template : Vérifier DNS privé AI Search
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: environment
    type: string
  - name: aiSearchName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '🔎 Vérifier DNS privé AI Search'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        RG="${{ parameters.resourceGroupName }}"
        SEARCH_NAME="${{ parameters.aiSearchName }}"
        SEARCH_ZONE="privatelink.search.windows.net"

        case "${{ parameters.environment }}" in
          dev)  VNET_NAME="vnet-gptrusted-dev"  ;;
          nprd) VNET_NAME="vnet-gptrusted-nprd" ;;
          prod) VNET_NAME="vnet-gptrusted-prod" ;;
          *)    VNET_NAME="vnet-gptrusted-${{ parameters.environment }}" ;;
        esac

        echo "================================================"
        echo "    VÉRIFICATION DNS PRIVÉ AI SEARCH            "
        echo "================================================"

        VNET_COUNT=$(az network vnet list --query "length([?name=='$VNET_NAME'])" -o tsv)
        if [ "$VNET_COUNT" -eq 0 ]; then
          echo "❌ VNet '$VNET_NAME' introuvable"
          exit 1
        fi
        if [ "$VNET_COUNT" -gt 1 ]; then
          echo "❌ Plusieurs VNets nommés '$VNET_NAME' trouvés"
          exit 1
        fi

        VNET_RG=$(az network vnet list --query "[?name=='$VNET_NAME']|[0].resourceGroup" -o tsv)
        SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        VNET_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$VNET_RG/providers/Microsoft.Network/virtualNetworks/$VNET_NAME"
        PE_NAME="pe-${SEARCH_NAME}-search"

        echo "VNet cible: $VNET_NAME (RG: $VNET_RG)"

        DNS_SERVERS=$(az network vnet show \
          --resource-group "$VNET_RG" \
          --name "$VNET_NAME" \
          --query "dhcpOptions.dnsServers" -o tsv 2>/dev/null || true)

        if [ -z "$DNS_SERVERS" ]; then
          echo "✅ DNS VNet: Azure DNS par défaut"
        else
          echo "⚠️  DNS VNet custom détecté: $DNS_SERVERS"
          echo "   Vérifiez le forwarder/conditional forwarder pour '$SEARCH_ZONE'."
        fi

        ERRORS=0

        ZONE_RGS=$(az network private-dns zone list \
          --query "[?name=='$SEARCH_ZONE'].resourceGroup" -o tsv 2>/dev/null || true)

        if [ -z "$ZONE_RGS" ]; then
          echo "❌ Zone DNS privée absente: $SEARCH_ZONE"
          exit 1
        fi

        if [ "$(echo "$ZONE_RGS" | sed '/^$/d' | wc -l | tr -d ' ')" -gt 1 ]; then
          echo "⚠️  Plusieurs zones '$SEARCH_ZONE' détectées:"
          echo "$ZONE_RGS"
        fi

        if echo "$ZONE_RGS" | grep -Fxq "$RG"; then
          ZONE_RG="$RG"
        else
          ZONE_RG=$(echo "$ZONE_RGS" | head -n 1)
        fi
        ZONE_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$ZONE_RG/providers/Microsoft.Network/privateDnsZones/$SEARCH_ZONE"

        echo "Zone retenue: $SEARCH_ZONE (RG: $ZONE_RG)"

        get_search_pe_private_ip() {
          local nic_id=""
          nic_id=$(az network private-endpoint show \
            --resource-group "$RG" \
            --name "$PE_NAME" \
            --query "networkInterfaces[0].id" -o tsv 2>/dev/null || true)

          if [ -z "$nic_id" ]; then
            return 1
          fi

          az network nic show \
            --ids "$nic_id" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null || true
        }

        LINK_NAME=$(az network private-dns link vnet list \
          --resource-group "$ZONE_RG" \
          --zone-name "$SEARCH_ZONE" \
          --query "[?virtualNetwork.id=='$VNET_ID']|[0].name" -o tsv 2>/dev/null || true)

        if [ -z "$LINK_NAME" ]; then
          echo "⚠️  Lien VNet manquant pour '$VNET_NAME' dans '$SEARCH_ZONE' - tentative de correction"
          LINK_NAME="link-${SEARCH_ZONE//./-}"
          az network private-dns link vnet create \
            --resource-group "$ZONE_RG" \
            --zone-name "$SEARCH_ZONE" \
            --name "$LINK_NAME" \
            --virtual-network "$VNET_ID" \
            --registration-enabled false \
            --only-show-errors >/dev/null || true

          LINK_NAME=$(az network private-dns link vnet list \
            --resource-group "$ZONE_RG" \
            --zone-name "$SEARCH_ZONE" \
            --query "[?virtualNetwork.id=='$VNET_ID']|[0].name" -o tsv 2>/dev/null || true)

          if [ -z "$LINK_NAME" ]; then
            echo "❌ Impossible de créer le lien zone/VNet"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ Lien zone/VNet créé: $LINK_NAME"
          fi
        else
          echo "✅ Lien zone/VNet: $LINK_NAME"
        fi

        SEARCH_A_RECORDS=$(az network private-dns record-set a show \
          --resource-group "$ZONE_RG" \
          --zone-name "$SEARCH_ZONE" \
          --name "$SEARCH_NAME" \
          --query "arecords[].ipv4Address" -o tsv 2>/dev/null || true)

        if [ -z "$SEARCH_A_RECORDS" ]; then
          echo "⚠️  Enregistrement A manquant: $SEARCH_NAME.$SEARCH_ZONE - tentative de correction"

          # Vérifie que le DNS zone group du PE pointe bien vers la zone Search retenue
          DNS_ZONE_IDS=$(az network private-endpoint dns-zone-group show \
            --resource-group "$RG" \
            --endpoint-name "$PE_NAME" \
            --name "default" \
            --query "privateDnsZoneConfigs[].privateDnsZoneId" -o tsv 2>/dev/null || true)

          if ! echo "$DNS_ZONE_IDS" | grep -Fq "$ZONE_ID"; then
            echo "⚠️  DNS zone group du PE incohérent - recréation"
            az network private-endpoint dns-zone-group delete \
              --resource-group "$RG" \
              --endpoint-name "$PE_NAME" \
              --name "default" \
              --yes \
              --only-show-errors >/dev/null 2>&1 || true

            az network private-endpoint dns-zone-group create \
              --resource-group "$RG" \
              --endpoint-name "$PE_NAME" \
              --name "default" \
              --private-dns-zone "$ZONE_ID" \
              --zone-name "default" \
              --only-show-errors >/dev/null

            # La création des enregistrements DNS via zone-group peut être asynchrone
            for i in $(seq 1 12); do
              SEARCH_A_RECORDS=$(az network private-dns record-set a show \
                --resource-group "$ZONE_RG" \
                --zone-name "$SEARCH_ZONE" \
                --name "$SEARCH_NAME" \
                --query "arecords[].ipv4Address" -o tsv 2>/dev/null || true)
              if [ -n "$SEARCH_A_RECORDS" ]; then
                break
              fi
              sleep 5
            done
          fi

          SEARCH_PE_IP=$(get_search_pe_private_ip || true)
          if [ -z "$SEARCH_PE_IP" ]; then
            echo "❌ Impossible de récupérer l'IP privée du Private Endpoint '$PE_NAME'"
            ERRORS=$((ERRORS + 1))
          else
            if [ -z "$SEARCH_A_RECORDS" ]; then
              # Cas fréquent: un CNAME existe déjà avec le même nom, ce qui bloque la création du A
              CNAME_TARGET=$(az network private-dns record-set cname show \
                --resource-group "$ZONE_RG" \
                --zone-name "$SEARCH_ZONE" \
                --name "$SEARCH_NAME" \
                --query "cnameRecord.cname" -o tsv 2>/dev/null || true)

              if [ -n "$CNAME_TARGET" ]; then
                echo "⚠️  Conflit détecté: CNAME existant '$SEARCH_NAME' -> '$CNAME_TARGET'"
                echo "   Suppression du CNAME pour permettre la création du record A"
                az network private-dns record-set cname delete \
                  --resource-group "$ZONE_RG" \
                  --zone-name "$SEARCH_ZONE" \
                  --name "$SEARCH_NAME" \
                  --yes \
                  --only-show-errors >/dev/null
              fi

              # Création explicite du record-set A puis ajout de l'IP PE
              az network private-dns record-set a create \
                --resource-group "$ZONE_RG" \
                --zone-name "$SEARCH_ZONE" \
                --name "$SEARCH_NAME" \
                --ttl 10 \
                --only-show-errors >/dev/null 2>&1 || true

              set +e
              ADD_OUTPUT=$(az network private-dns record-set a add-record \
                --resource-group "$ZONE_RG" \
                --zone-name "$SEARCH_ZONE" \
                --record-set-name "$SEARCH_NAME" \
                --ipv4-address "$SEARCH_PE_IP" \
                --only-show-errors 2>&1)
              ADD_EXIT=$?
              set -e

              if [ "$ADD_EXIT" -ne 0 ]; then
                echo "❌ Échec add-record pour $SEARCH_NAME.$SEARCH_ZONE (IP: $SEARCH_PE_IP)"
                echo "$ADD_OUTPUT"
              fi
            fi

            SEARCH_A_RECORDS=$(az network private-dns record-set a show \
              --resource-group "$ZONE_RG" \
              --zone-name "$SEARCH_ZONE" \
              --name "$SEARCH_NAME" \
              --query "arecords[].ipv4Address" -o tsv 2>/dev/null || true)

            if [ -z "$SEARCH_A_RECORDS" ]; then
              echo "❌ Impossible de créer l'enregistrement A pour $SEARCH_NAME.$SEARCH_ZONE"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ Enregistrement A recréé: $SEARCH_NAME.$SEARCH_ZONE -> $SEARCH_A_RECORDS"
            fi
          fi
        else
          echo "✅ Enregistrement A: $SEARCH_NAME.$SEARCH_ZONE -> $SEARCH_A_RECORDS"
        fi

        if [ "$ERRORS" -gt 0 ]; then
          echo "❌ Vérification DNS privé AI Search KO ($ERRORS erreur(s))"
          exit 1
        fi

        echo "✅ Vérification DNS privé AI Search OK"
