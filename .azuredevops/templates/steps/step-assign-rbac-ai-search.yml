# =============================================================================
# Step Template : Assigner les rôles RBAC AI Search
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: companionResourceGroupName
    type: string
  - name: sharedResourceGroupName
    type: string
  - name: managedIdentityName
    type: string
  - name: aiSearchName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '🔑 Assigner rôle AI Search'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        echo "Assignation du rôle AI Search..."
        
        MSI_PRINCIPAL_ID=$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.companionResourceGroupName }}" \
          --query principalId -o tsv)
        
        SEARCH_ID=$(az search service show \
          --name "${{ parameters.aiSearchName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query id -o tsv)

        EXISTING_COUNT=$(az role assignment list \
          --assignee "$MSI_PRINCIPAL_ID" \
          --scope "$SEARCH_ID" \
          --query "[?roleDefinitionName=='Search Index Data Contributor'] | length(@)" \
          -o tsv)

        if [ "$EXISTING_COUNT" != "0" ]; then
          echo "ℹ️  Rôle Search Index Data Contributor déjà assigné"
        else
          az role assignment create \
            --assignee "$MSI_PRINCIPAL_ID" \
            --role "Search Index Data Contributor" \
            --scope "$SEARCH_ID" \
            --only-show-errors

          echo "✅ Search Index Data Contributor assigné"
        fi
