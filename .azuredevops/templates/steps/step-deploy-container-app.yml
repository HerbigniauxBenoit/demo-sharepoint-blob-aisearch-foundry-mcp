# =============================================================================
# Step Template : Deploy Container App on Azure Container Apps
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: sharedResourceGroupName
    type: string
  - name: containerAppName
    type: string
  - name: containerAppsEnvName
    type: string
  - name: managedIdentityName
    type: string
  - name: appInsightsName
    type: string
  - name: acrName
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: storageAccountName
    type: string
  - name: blobContainerName
    type: string
  - name: sharepointSiteUrl
    type: string
  - name: sharepointDriveName
    type: string
  - name: sharepointFolderPath
    type: string
  - name: syncSchedule
    type: string
  - name: deleteOrphanedBlobs
    type: string

steps:
  - task: AzureCLI@2
    displayName: 'Step 1/3 : Create Container App with placeholder image'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "================================================"
        echo " DEPLOY CONTAINER APP ON AZURE CONTAINER APPS  "
        echo "================================================"

        if az containerapp show \
            --name "${{ parameters.containerAppName }}" \
            --resource-group "${{ parameters.sharedResourceGroupName }}" \
            &>/dev/null; then
          echo "Container App existe déjà, aucun changement appliqué."
          az containerapp show \
            --name "${{ parameters.containerAppName }}" \
            --resource-group "${{ parameters.sharedResourceGroupName }}" \
            --query "{name:name, provisioningState:provisioningState}" \
            -o table
          exit 0
        fi

        az containerapp env show \
          --name "${{ parameters.containerAppsEnvName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --only-show-errors >/dev/null

        # Récupérer le resource ID de la MSI user-assigned
        MSI_ID=$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query id -o tsv \
          --only-show-errors)

        echo "MSI ID : $MSI_ID"
        echo "Création de la Container App avec image placeholder..."

        az containerapp create \
          --name "${{ parameters.containerAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --environment "${{ parameters.containerAppsEnvName }}" \
          --image "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" \
          --user-assigned "$MSI_ID" \
          --min-replicas 1 \
          --max-replicas 1 \
          --only-show-errors

        echo "✅ Container App créée avec MSI user-assigned : ${{ parameters.managedIdentityName }}"

  - template: step-assign-acr-pull.yml
    parameters:
      azureSubscription: ${{ parameters.azureSubscription }}
      sharedResourceGroupName: ${{ parameters.sharedResourceGroupName }}
      managedIdentityName: ${{ parameters.managedIdentityName }}
      acrName: ${{ parameters.acrName }}
      waitForPropagation: true

  - task: AzureCLI@2
    displayName: 'Step 3/3 : Update Container App with ACR image'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        APP_INSIGHTS_CONNECTION_STRING=$(az monitor app-insights component show \
          --app "${{ parameters.appInsightsName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query connectionString -o tsv \
          --only-show-errors)

        ACR_LOGIN_SERVER=$(az acr show \
          --name "${{ parameters.acrName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query loginServer -o tsv \
          --only-show-errors)

        # La MSI expose deux identifiants utiles ici :
        # - id       : resource ID Azure pour lier le registry ACR
        # - clientId : identifiant Entra pour le host Functions et DefaultAzureCredential
        read -r MSI_ID MSI_CLIENT_ID <<< "$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query "[id,clientId]" -o tsv \
          --only-show-errors)"

        IMAGE_NAME="$ACR_LOGIN_SERVER/${{ parameters.imageName }}:${{ parameters.imageTag }}"

        echo "MSI Resource ID: $MSI_ID"
        echo "MSI Client ID  : $MSI_CLIENT_ID"
        echo "Image          : $IMAGE_NAME"

        echo "Configuration du registry ACR avec la MSI user-assigned..."

        az containerapp registry set \
          --name "${{ parameters.containerAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --server "$ACR_LOGIN_SERVER" \
          --identity "$MSI_ID" \
          --only-show-errors

        echo "Mise à jour de l'image et des variables d'environnement..."

        az containerapp update \
          --name "${{ parameters.containerAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --image "$IMAGE_NAME" \
          --set-env-vars \
            "SHAREPOINT_SITE_URL=${{ parameters.sharepointSiteUrl }}" \
            "SHAREPOINT_DRIVE_NAME=${{ parameters.sharepointDriveName }}" \
            "SHAREPOINT_FOLDER_PATH=${{ parameters.sharepointFolderPath }}" \
            "AZURE_STORAGE_ACCOUNT_NAME=${{ parameters.storageAccountName }}" \
            "AZURE_BLOB_CONTAINER_NAME=${{ parameters.blobContainerName }}" \
            "AZURE_BLOB_PREFIX=" \
            "DELETE_ORPHANED_BLOBS=${{ parameters.deleteOrphanedBlobs }}" \
            "SYNC_PERMISSIONS=false" \
            "SYNC_SCHEDULE=${{ parameters.syncSchedule }}" \
            "APPLICATIONINSIGHTS_CONNECTION_STRING=$APP_INSIGHTS_CONNECTION_STRING" \
            "WEBSITES_INCLUDE_CLOUD_CERTS=true" \
            "AzureWebJobsStorage__accountName=${{ parameters.storageAccountName }}" \
            "AzureWebJobsStorage__credential=managedidentity" \
            "AzureWebJobsStorage__clientId=$MSI_CLIENT_ID" \
            "AZURE_CLIENT_ID=$MSI_CLIENT_ID" \
          --only-show-errors

        az containerapp show \
          --name "${{ parameters.containerAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query "{name:name, provisioningState:provisioningState}" \
          -o table

        echo ""
        echo "✅ Container App déployée : ${{ parameters.containerAppName }}"