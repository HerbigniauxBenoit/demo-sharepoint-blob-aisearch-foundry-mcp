# =============================================================================
# Step Template : Deploy Function App on Azure Container Apps
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: sharedResourceGroupName
    type: string
  - name: functionAppName
    type: string
  - name: containerAppsEnvName
    type: string
  - name: managedIdentityName
    type: string
  - name: appInsightsName
    type: string
  - name: acrName
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: storageAccountName
    type: string
  - name: blobContainerName
    type: string
  - name: sharepointSiteUrl
    type: string
  - name: sharepointDriveName
    type: string
  - name: sharepointFolderPath
    type: string
  - name: syncSchedule
    type: string
  - name: deleteOrphanedBlobs
    type: string
  - name: syncPermissions
    type: string
  - name: environment
    type: string
  - name: companionName
    type: string

steps:
  - task: AzureCLI@2
    displayName: 'Deploy Function App (Container Apps)'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "================================================"
        echo " DEPLOY FUNCTION APP ON CONTAINER APPS          "
        echo "================================================"
        echo ""

        MSI_ID=$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query id -o tsv)

        MSI_CLIENT_ID=$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query clientId -o tsv)

        MSI_PRINCIPAL_ID=$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query principalId -o tsv)

        az containerapp env show \
          --name "${{ parameters.containerAppsEnvName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --only-show-errors >/dev/null

        az storage account show \
          --name "${{ parameters.storageAccountName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --only-show-errors >/dev/null

        APP_INSIGHTS_CONNECTION_STRING=$(az monitor app-insights component show \
          --app "${{ parameters.appInsightsName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query connectionString -o tsv)

        ACR_ID=$(az acr show \
          --name "${{ parameters.acrName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query id -o tsv)

        ACR_LOGIN_SERVER=$(az acr show \
          --name "${{ parameters.acrName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query loginServer -o tsv)

        az role assignment create \
          --assignee-object-id "$MSI_PRINCIPAL_ID" \
          --assignee-principal-type ServicePrincipal \
          --role "AcrPull" \
          --scope "$ACR_ID" \
          --only-show-errors || echo "Info: AcrPull role already assigned"

        IMAGE_NAME="$ACR_LOGIN_SERVER/${{ parameters.imageName }}:${{ parameters.imageTag }}"

        az acr repository show \
          --name "${{ parameters.acrName }}" \
          --image "${{ parameters.imageName }}:${{ parameters.imageTag }}" \
          --only-show-errors >/dev/null

        if az functionapp show --name "${{ parameters.functionAppName }}" --resource-group "${{ parameters.sharedResourceGroupName }}" &>/dev/null; then
          echo "Function App existe, mise a jour de l'image..."
        else
          echo "Creating Function App on Container Apps..."

          az functionapp create \
            --name "${{ parameters.functionAppName }}" \
            --resource-group "${{ parameters.sharedResourceGroupName }}" \
            --storage-account "${{ parameters.storageAccountName }}" \
            --environment "${{ parameters.containerAppsEnvName }}" \
            --functions-version 4 \
            --runtime dotnet-isolated \
            --runtime-version 8 \
            --image "$IMAGE_NAME"
        fi

        az functionapp identity assign \
          --name "${{ parameters.functionAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --identities "$MSI_ID"

        az resource update \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --resource-type "Microsoft.Web/sites" \
          --name "${{ parameters.functionAppName }}" \
          --set properties.siteConfig.acrUseManagedIdentityCreds=true properties.siteConfig.acrUserManagedIdentityID="$MSI_CLIENT_ID" \
          --only-show-errors >/dev/null

        az functionapp config container set \
          --name "${{ parameters.functionAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --image "$IMAGE_NAME" \
          --registry-server "https://$ACR_LOGIN_SERVER"

        az functionapp config appsettings set \
          --name "${{ parameters.functionAppName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --settings \
            "FUNCTIONS_WORKER_RUNTIME=dotnet-isolated" \
            "SHAREPOINT_SITE_URL=${{ parameters.sharepointSiteUrl }}" \
            "SHAREPOINT_DRIVE_NAME=${{ parameters.sharepointDriveName }}" \
            "SHAREPOINT_FOLDER_PATH=${{ parameters.sharepointFolderPath }}" \
            "AZURE_STORAGE_ACCOUNT_NAME=${{ parameters.storageAccountName }}" \
            "AZURE_BLOB_CONTAINER_NAME=${{ parameters.blobContainerName }}" \
            "AZURE_BLOB_PREFIX=" \
            "DELETE_ORPHANED_BLOBS=${{ parameters.deleteOrphanedBlobs }}" \
            "SYNC_PERMISSIONS=${{ parameters.syncPermissions }}" \
            "SYNC_SCHEDULE=${{ parameters.syncSchedule }}" \
            "AZURE_CLIENT_ID=$MSI_CLIENT_ID" \
            "APPLICATIONINSIGHTS_CONNECTION_STRING=$APP_INSIGHTS_CONNECTION_STRING" \
            "AzureWebJobsStorage__accountName=${{ parameters.storageAccountName }}" \
            "AzureWebJobsStorage__credential=managedidentity" \
            "AzureWebJobsStorage__clientId=$MSI_CLIENT_ID"

        echo ""
        echo "Function App deployed: ${{ parameters.functionAppName }}"
