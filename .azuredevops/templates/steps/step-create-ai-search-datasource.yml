# =============================================================================
# Step Template : Créer AI Search Data Source
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: aiSearchName
    type: string
  - name: storageAccountName
    type: string
  - name: dataSourceName
    type: string
  - name: containerName
    type: string
  - name: companionName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '🔗 Créer Data Source AI Search'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "================================================"
        echo "    CRÉATION DU DATA SOURCE                     "
        echo "================================================"
        echo ""

        RG="${{ parameters.resourceGroupName }}"
        SEARCH_NAME="${{ parameters.aiSearchName }}"
        STORAGE_NAME="${{ parameters.storageAccountName }}"
        DS_NAME="${{ parameters.dataSourceName }}"
        CONTAINER_NAME="${{ parameters.containerName }}"
        COMPANION_NAME="${{ parameters.companionName }}"

        SEARCH_PUBLIC_HOST="${SEARCH_NAME}.search.windows.net"
        SEARCH_PRIVATE_HOST="${SEARCH_NAME}.privatelink.search.windows.net"

        resolve_host() {
          local host="$1"
          if getent hosts "$host" >/dev/null 2>&1; then
            return 0
          fi
          if nslookup "$host" >/dev/null 2>&1; then
            return 0
          fi
          return 1
        }

        select_search_host() {
          if resolve_host "$SEARCH_PUBLIC_HOST"; then
            echo "$SEARCH_PUBLIC_HOST"
            return 0
          fi
          if resolve_host "$SEARCH_PRIVATE_HOST"; then
            echo "$SEARCH_PRIVATE_HOST"
            return 0
          fi
          return 1
        }

        get_search_private_ip() {
          local pe_name="pe-${SEARCH_NAME}-search"
          local nic_id=""
          nic_id=$(az network private-endpoint show \
            --resource-group "$RG" \
            --name "$pe_name" \
            --query "networkInterfaces[0].id" -o tsv 2>/dev/null || true)

          if [ -z "$nic_id" ]; then
            return 1
          fi

          az network nic show \
            --ids "$nic_id" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null || true
        }

        print_search_network_diagnostics() {
          local host="$1"
          echo "=== Diagnostic réseau AI Search ==="
          echo "Host: $host"
          echo "Résolution DNS (getent):"
          getent hosts "$host" || true
          echo "Résolution DNS (nslookup):"
          nslookup "$host" 2>/dev/null || true
          echo "==================================="
        }

        CURL_SEARCH_EXTRA_ARGS=()
        if ! SEARCH_HOST=$(select_search_host); then
          SEARCH_PRIVATE_IP=$(get_search_private_ip || true)
          if [ -n "$SEARCH_PRIVATE_IP" ]; then
            SEARCH_HOST="$SEARCH_PRIVATE_HOST"
            CURL_SEARCH_EXTRA_ARGS=(--resolve "${SEARCH_HOST}:443:${SEARCH_PRIVATE_IP}")
            echo "⚠️ DNS indisponible, contournement via Private Endpoint IP: $SEARCH_PRIVATE_IP"
          else
            echo "❌ Résolution DNS impossible pour AI Search (public et privatelink)"
            print_search_network_diagnostics "$SEARCH_PUBLIC_HOST"
            print_search_network_diagnostics "$SEARCH_PRIVATE_HOST"
            exit 6
          fi
        fi

        SEARCH_URL="https://${SEARCH_HOST}"
        echo "Endpoint AI Search utilisé: $SEARCH_URL"

        # Récupération de la clé admin (masquée dans les logs via variable locale)
        SEARCH_KEY=$(az search admin-key show \
          --service-name "$SEARCH_NAME" \
          --resource-group "$RG" \
          --query primaryKey -o tsv)

        # Récupération du resource ID du Storage (pour Managed Identity)
        STORAGE_ID=$(az storage account show \
          --name "$STORAGE_NAME" \
          --resource-group "$RG" \
          --query id -o tsv)

        # ----------------------------------------------------------------
        # Vérification si le Data Source existe déjà
        # ----------------------------------------------------------------
        echo "Vérification du Data Source '$DS_NAME'..."

        CURL_EXIT=0
        EXISTING_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          "${CURL_SEARCH_EXTRA_ARGS[@]}" \
          -X GET "$SEARCH_URL/datasources/$DS_NAME?api-version=2024-07-01" \
          -H "api-key: $SEARCH_KEY") || CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "❌ curl a échoué (exit code $CURL_EXIT) en joignant AI Search"
          print_search_network_diagnostics "$SEARCH_HOST"
          exit "$CURL_EXIT"
        fi

        if [ "$EXISTING_STATUS" == "200" ]; then
          echo "⏭️  Data Source '$DS_NAME' déjà présent, skip."
          exit 0
        fi

        # ----------------------------------------------------------------
        # Création avec Managed Identity (plus de connection string)
        # Compatible avec Storage en accès public désactivé
        # ----------------------------------------------------------------
        echo "Création du Data Source '$DS_NAME'..."

        PAYLOAD=$(cat <<EOF
        {
          "name": "$DS_NAME",
          "type": "azureblob",
          "credentials": {
            "connectionString": "ResourceId=$STORAGE_ID;"
          },
          "container": {
            "name": "$CONTAINER_NAME"
          },
          "description": "Data source for companion $COMPANION_NAME",
          "identity": {
            "@odata.type": "#Microsoft.Azure.Search.DataUserAssignedIdentity",
            "userAssignedIdentity": null
          }
        }
        EOF
        )

        CURL_EXIT=0
        HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
          "${CURL_SEARCH_EXTRA_ARGS[@]}" \
          -X PUT "$SEARCH_URL/datasources/$DS_NAME?api-version=2024-07-01" \
          -H "Content-Type: application/json" \
          -H "api-key: $SEARCH_KEY" \
          -d "$PAYLOAD") || CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "❌ curl a échoué (exit code $CURL_EXIT) pendant la création du Data Source"
          print_search_network_diagnostics "$SEARCH_HOST"
          exit "$CURL_EXIT"
        fi

        HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
        HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

        if [ "$HTTP_STATUS" == "201" ] || [ "$HTTP_STATUS" == "204" ]; then
          echo "✅ Data Source '$DS_NAME' créé avec succès"
        else
          echo "❌ Erreur lors de la création du Data Source (HTTP $HTTP_STATUS)"
          echo "   Détail: $HTTP_BODY"
          exit 1
        fi