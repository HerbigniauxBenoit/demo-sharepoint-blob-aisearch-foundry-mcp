# =============================================================================
# Step Template : Créer AI Search Data Source
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: aiSearchName
    type: string
  - name: storageAccountName
    type: string
  - name: dataSourceName
    type: string
  - name: containerName
    type: string
  - name: companionName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '🔗 Créer Data Source AI Search'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "================================================"
        echo "    CRÉATION DU DATA SOURCE                     "
        echo "================================================"
        echo ""

        RG="${{ parameters.resourceGroupName }}"
        SEARCH_NAME="${{ parameters.aiSearchName }}"
        STORAGE_NAME="${{ parameters.storageAccountName }}"
        DS_NAME="${{ parameters.dataSourceName }}"
        CONTAINER_NAME="${{ parameters.containerName }}"
        COMPANION_NAME="${{ parameters.companionName }}"

        SEARCH_URL="https://${SEARCH_NAME}.search.windows.net"

        print_search_network_diagnostics() {
          local host="${SEARCH_NAME}.search.windows.net"
          echo "=== Diagnostic réseau AI Search ==="
          echo "Host: $host"
          echo "Résolution DNS (getent):"
          getent hosts "$host" || true
          echo "Résolution DNS (nslookup):"
          nslookup "$host" 2>/dev/null || true
          echo "==================================="
        }

        # Récupération de la clé admin (masquée dans les logs via variable locale)
        SEARCH_KEY=$(az search admin-key show \
          --service-name "$SEARCH_NAME" \
          --resource-group "$RG" \
          --query primaryKey -o tsv)

        # Récupération du resource ID du Storage (pour Managed Identity)
        STORAGE_ID=$(az storage account show \
          --name "$STORAGE_NAME" \
          --resource-group "$RG" \
          --query id -o tsv)

        # ----------------------------------------------------------------
        # Vérification si le Data Source existe déjà
        # ----------------------------------------------------------------
        echo "Vérification du Data Source '$DS_NAME'..."

        CURL_EXIT=0
        EXISTING_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X GET "$SEARCH_URL/datasources/$DS_NAME?api-version=2024-07-01" \
          -H "api-key: $SEARCH_KEY") || CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "❌ curl a échoué (exit code $CURL_EXIT) en joignant AI Search"
          print_search_network_diagnostics
          exit "$CURL_EXIT"
        fi

        if [ "$EXISTING_STATUS" == "200" ]; then
          echo "⏭️  Data Source '$DS_NAME' déjà présent, skip."
          exit 0
        fi

        # ----------------------------------------------------------------
        # Création avec Managed Identity (plus de connection string)
        # Compatible avec Storage en accès public désactivé
        # ----------------------------------------------------------------
        echo "Création du Data Source '$DS_NAME'..."

        PAYLOAD=$(cat <<EOF
        {
          "name": "$DS_NAME",
          "type": "azureblob",
          "credentials": {
            "connectionString": "ResourceId=$STORAGE_ID;"
          },
          "container": {
            "name": "$CONTAINER_NAME"
          },
          "description": "Data source for companion $COMPANION_NAME",
          "identity": {
            "@odata.type": "#Microsoft.Azure.Search.DataUserAssignedIdentity",
            "userAssignedIdentity": null
          }
        }
        EOF
        )

        CURL_EXIT=0
        HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X PUT "$SEARCH_URL/datasources/$DS_NAME?api-version=2024-07-01" \
          -H "Content-Type: application/json" \
          -H "api-key: $SEARCH_KEY" \
          -d "$PAYLOAD") || CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "❌ curl a échoué (exit code $CURL_EXIT) pendant la création du Data Source"
          print_search_network_diagnostics
          exit "$CURL_EXIT"
        fi

        HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
        HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

        if [ "$HTTP_STATUS" == "201" ] || [ "$HTTP_STATUS" == "204" ]; then
          echo "✅ Data Source '$DS_NAME' créé avec succès"
        else
          echo "❌ Erreur lors de la création du Data Source (HTTP $HTTP_STATUS)"
          echo "   Détail: $HTTP_BODY"
          exit 1
        fi