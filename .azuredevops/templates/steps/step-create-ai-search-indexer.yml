# =============================================================================
# Step Template : Créer AI Search Indexer
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: networkResourceGroupName
    type: string
  - name: aiSearchName
    type: string
  - name: storageAccountName
    type: string
  - name: indexerName
    type: string
  - name: dataSourceName
    type: string
  - name: indexName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '⚙️ Créer Indexer'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "================================================"
        echo "    CRÉATION DE L'INDEXER                       "
        echo "================================================"
        echo ""

        RG="${{ parameters.resourceGroupName }}"
        NETWORK_RG="${{ parameters.networkResourceGroupName }}"
        if [ -z "$NETWORK_RG" ]; then
          NETWORK_RG="$RG"
        fi
        SEARCH_NAME="${{ parameters.aiSearchName }}"
        STORAGE_NAME="${{ parameters.storageAccountName }}"
        
        SEARCH_KEY=$(az search admin-key show \
          --service-name "${{ parameters.aiSearchName }}" \
          --resource-group "${{ parameters.resourceGroupName }}" \
          --query primaryKey -o tsv)
        
        SEARCH_PUBLIC_HOST="${{ parameters.aiSearchName }}.search.windows.net"
        SEARCH_PRIVATE_HOST="${{ parameters.aiSearchName }}.privatelink.search.windows.net"

        resolve_host() {
          local host="$1"
          if getent hosts "$host" >/dev/null 2>&1; then
            return 0
          fi
          if nslookup "$host" >/dev/null 2>&1; then
            return 0
          fi
          return 1
        }

        select_search_host() {
          if resolve_host "$SEARCH_PUBLIC_HOST"; then
            echo "$SEARCH_PUBLIC_HOST"
            return 0
          fi
          if resolve_host "$SEARCH_PRIVATE_HOST"; then
            echo "$SEARCH_PRIVATE_HOST"
            return 0
          fi
          return 1
        }

        get_search_private_ip() {
          local pe_name="pe-${SEARCH_NAME}-search"
          local nic_id=""
          nic_id=$(az network private-endpoint show \
            --resource-group "$NETWORK_RG" \
            --name "$pe_name" \
            --query "networkInterfaces[0].id" -o tsv 2>/dev/null || true)

          if [ -z "$nic_id" ]; then
            return 1
          fi

          az network nic show \
            --ids "$nic_id" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null || true
        }

        print_search_network_diagnostics() {
          local host="$1"
          echo "=== Diagnostic réseau AI Search ==="
          echo "Host: $host"
          echo "Résolution DNS (getent):"
          getent hosts "$host" || true
          echo "Résolution DNS (nslookup):"
          nslookup "$host" 2>/dev/null || true
          echo "==================================="
        }

        CURL_SEARCH_EXTRA_ARGS=()
        if ! SEARCH_HOST=$(select_search_host); then
          SEARCH_PRIVATE_IP=$(get_search_private_ip || true)
          if [ -n "$SEARCH_PRIVATE_IP" ]; then
            SEARCH_HOST="$SEARCH_PUBLIC_HOST"
            CURL_SEARCH_EXTRA_ARGS=(--resolve "${SEARCH_PUBLIC_HOST}:443:${SEARCH_PRIVATE_IP}")
            echo "⚠️ DNS indisponible, contournement via Private Endpoint IP: $SEARCH_PRIVATE_IP"
          else
            echo "❌ Résolution DNS impossible pour AI Search (public et privatelink)"
            print_search_network_diagnostics "$SEARCH_PUBLIC_HOST"
            print_search_network_diagnostics "$SEARCH_PRIVATE_HOST"
            exit 6
          fi
        fi

        SEARCH_URL="https://${SEARCH_HOST}"
        echo "Endpoint AI Search utilisé: $SEARCH_URL"

        SEARCH_MI_TYPE=$(az search service show \
          --name "$SEARCH_NAME" \
          --resource-group "$RG" \
          --query "identity.type" -o tsv 2>/dev/null || true)

        if [ -z "$SEARCH_MI_TYPE" ] || [ "$SEARCH_MI_TYPE" = "None" ] || [ "$SEARCH_MI_TYPE" = "null" ]; then
          echo "⚠️  Identité managée absente sur AI Search. Activation en cours..."

          az search service update \
            --name "$SEARCH_NAME" \
            --resource-group "$RG" \
            --identity-type SystemAssigned \
            --only-show-errors >/dev/null

          SEARCH_MI_TYPE=$(az search service show \
            --name "$SEARCH_NAME" \
            --resource-group "$RG" \
            --query "identity.type" -o tsv 2>/dev/null || true)
        fi

        if [ -z "$SEARCH_MI_TYPE" ] || [ "$SEARCH_MI_TYPE" = "None" ] || [ "$SEARCH_MI_TYPE" = "null" ]; then
          echo "❌ Impossible d'activer l'identité managée AI Search."
          echo "   Corrigez la ressource Search (identity.type=SystemAssigned), puis relancez le pipeline."
          exit 1
        fi

        echo "✅ Identité managée AI Search active: $SEARCH_MI_TYPE"

        # ================================================================
        # Vérification et assignation RBAC: Storage Blob Data Reader
        # ================================================================
        echo ""
        echo "Vérification permissions RBAC (Storage Blob Data Reader)..."

        SEARCH_PRINCIPAL_ID=$(az search service show \
          --name "$SEARCH_NAME" \
          --resource-group "$RG" \
          --query "identity.principalId" -o tsv 2>/dev/null || true)

        if [ -z "$SEARCH_PRINCIPAL_ID" ]; then
          echo "❌ Impossible de récupérer le principalId de l'identité AI Search."
          exit 1
        fi

        STORAGE_ID=$(az storage account show \
          --name "${STORAGE_NAME}" \
          --resource-group "$RG" \
          --query id -o tsv 2>/dev/null || true)

        if [ -z "$STORAGE_ID" ]; then
          echo "❌ Impossible de récupérer l'ID du compte Storage."
          exit 1
        fi

        ROLE_ID="2a2b9908-6ea1-4ae2-8e65-a410df84e7d1"  # Storage Blob Data Reader

        EXISTING_ASSIGNMENT=$(az role assignment list \
          --assignee "$SEARCH_PRINCIPAL_ID" \
          --scope "$STORAGE_ID" \
          --query "length(@)" -o tsv 2>/dev/null || echo "0")

        if [ "$EXISTING_ASSIGNMENT" -gt 0 ]; then
          echo "✅ Rôle Storage Blob Data Reader déjà assigné à l'identité AI Search"
        else
          echo "⚠️  Assignation du rôle Storage Blob Data Reader en cours..."

          az role assignment create \
            --role "$ROLE_ID" \
            --assignee-object-id "$SEARCH_PRINCIPAL_ID" \
            --scope "$STORAGE_ID" \
            --only-show-errors >/dev/null

          echo "✅ Rôle Storage Blob Data Reader assigné"
          echo "Attente de propagation RBAC (30s)..."
          sleep 30
        fi
        
        echo "Création de l'indexer '${{ parameters.indexerName }}'..."

        CURL_EXIT=0
        INDEX_RESPONSE=$(curl -s -w "\n%{http_code}" \
          "${CURL_SEARCH_EXTRA_ARGS[@]}" \
          -X GET "$SEARCH_URL/indexes/${{ parameters.indexName }}?api-version=2024-07-01" \
          -H "api-key: $SEARCH_KEY") || CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "❌ curl a échoué (exit code $CURL_EXIT) pendant la lecture de l'index"
          print_search_network_diagnostics "$SEARCH_HOST"
          exit "$CURL_EXIT"
        fi

        INDEX_BODY=$(echo "$INDEX_RESPONSE" | head -n -1)
        INDEX_STATUS=$(echo "$INDEX_RESPONSE" | tail -n 1)

        if [ "$INDEX_STATUS" != "200" ]; then
          echo "❌ Impossible de lire l'index '${{ parameters.indexName }}' (HTTP $INDEX_STATUS)"
          echo "   Détail: $INDEX_BODY"
          exit 1
        fi

        if echo "$INDEX_BODY" | grep -Eq '"name"[[:space:]]*:[[:space:]]*"id"'; then
          TARGET_KEY_FIELD="id"
        elif echo "$INDEX_BODY" | grep -Eq '"name"[[:space:]]*:[[:space:]]*"chunk_id"'; then
          TARGET_KEY_FIELD="chunk_id"
        else
          echo "❌ Aucun champ clé compatible détecté dans l'index (attendu: id ou chunk_id)."
          exit 1
        fi

        echo "Champ clé détecté pour le mapping: $TARGET_KEY_FIELD"

        PAYLOAD=$(cat <<EOF
        {
          "name": "${{ parameters.indexerName }}",
          "dataSourceName": "${{ parameters.dataSourceName }}",
          "targetIndexName": "${{ parameters.indexName }}",
          "schedule": {"interval": "PT1H"},
          "parameters": {
            "configuration": {
              "dataToExtract": "contentAndMetadata",
              "parsingMode": "default"
            }
          },
          "fieldMappings": [
            {
              "sourceFieldName": "metadata_storage_path",
              "targetFieldName": "$TARGET_KEY_FIELD",
              "mappingFunction": {"name": "base64Encode"}
            }
          ]
        }
        EOF
        )
        
        INDEXER_RETRYABLE_ERROR="Unable to retrieve blob container for account"
        MAX_INDEXER_ATTEMPTS=4
        INDEXER_CREATED=false

        for attempt in $(seq 1 "$MAX_INDEXER_ATTEMPTS"); do
          CURL_EXIT=0
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${CURL_SEARCH_EXTRA_ARGS[@]}" \
            -X PUT "$SEARCH_URL/indexers/${{ parameters.indexerName }}?api-version=2024-07-01" \
            -H "Content-Type: application/json" \
            -H "api-key: $SEARCH_KEY" \
            -d "$PAYLOAD") || CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "❌ curl a échoué (exit code $CURL_EXIT) pendant la création de l'indexer"
            print_search_network_diagnostics "$SEARCH_HOST"
            exit "$CURL_EXIT"
          fi

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_STATUS" == "201" ] || [ "$HTTP_STATUS" == "204" ]; then
            echo "✅ Indexer créé/mis à jour"
            INDEXER_CREATED=true
            break
          fi

          if [ "$HTTP_STATUS" == "404" ] && echo "$HTTP_BODY" | grep -Fq "$INDEXER_RETRYABLE_ERROR" && [ "$attempt" -lt "$MAX_INDEXER_ATTEMPTS" ]; then
            echo "⚠️  AI Search ne voit pas encore le container Blob via l'identité managée (tentative $attempt/$MAX_INDEXER_ATTEMPTS)."
            echo "   Attente de propagation RBAC supplémentaire (20s) avant retry..."
            sleep 20
            continue
          fi

          echo "❌ Erreur lors de la création de l'indexer (HTTP $HTTP_STATUS)"
          echo "   Détail: $HTTP_BODY"
          exit 1
        done

        if [ "$INDEXER_CREATED" != "true" ]; then
          echo "❌ Erreur lors de la création de l'indexer après $MAX_INDEXER_ATTEMPTS tentatives"
          echo "   Détail: $HTTP_BODY"
          exit 1
        fi
        
        echo ""
        echo "=== Configuration AI Search terminée ==="
        echo "Data Source : ${{ parameters.dataSourceName }}"
        echo "Index       : ${{ parameters.indexName }}"
        echo "Indexer     : ${{ parameters.indexerName }}"
