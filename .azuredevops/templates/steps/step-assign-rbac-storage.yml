# =============================================================================
# Step Template : Assigner les rôles RBAC Storage
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: companionResourceGroupName
    type: string
  - name: sharedResourceGroupName
    type: string
  - name: managedIdentityName
    type: string
  - name: storageAccountName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '🔑 Assigner rôles Storage'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        echo "================================================"
        echo "    ASSIGNATION DES RÔLES RBAC - STORAGE        "
        echo "================================================"
        echo ""
        
        MSI_PRINCIPAL_ID=$(az identity show \
          --name "${{ parameters.managedIdentityName }}" \
          --resource-group "${{ parameters.companionResourceGroupName }}" \
          --query principalId -o tsv)
        
        STORAGE_ID=$(az storage account show \
          --name "${{ parameters.storageAccountName }}" \
          --resource-group "${{ parameters.sharedResourceGroupName }}" \
          --query id -o tsv)
        
        echo "MSI Principal ID : $MSI_PRINCIPAL_ID"
        echo "Storage ID       : $STORAGE_ID"
        echo ""
        
        for ROLE in "Storage Blob Data Owner" "Storage Queue Data Contributor" "Storage Table Data Contributor"; do
          EXISTING_COUNT=$(az role assignment list \
            --assignee "$MSI_PRINCIPAL_ID" \
            --scope "$STORAGE_ID" \
            --query "[?roleDefinitionName=='$ROLE'] | length(@)" \
            -o tsv)

          if [ "$EXISTING_COUNT" != "0" ]; then
            echo "ℹ️  Rôle '$ROLE' déjà assigné"
          else
            echo "Assignation de '$ROLE'..."
            az role assignment create \
              --assignee "$MSI_PRINCIPAL_ID" \
              --role "$ROLE" \
              --scope "$STORAGE_ID" \
              --only-show-errors
            echo "✅ $ROLE assigné"
          fi
        done
        
        echo ""
        echo "✅ Tous les rôles Storage assignés"
