# =============================================================================
# Step Template : Créer AI Search Index
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: aiSearchName
    type: string
  - name: indexName
    type: string

steps:
  - task: AzureCLI@2
    displayName: '📇 Créer Index'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        echo "================================================"
        echo "    CRÉATION DE L'INDEX                         "
        echo "================================================"
        echo ""
        
        SEARCH_KEY=$(az search admin-key show \
          --service-name "${{ parameters.aiSearchName }}" \
          --resource-group "${{ parameters.resourceGroupName }}" \
          --query primaryKey -o tsv)
        
        SEARCH_URL="https://${{ parameters.aiSearchName }}.search.windows.net"

        print_search_network_diagnostics() {
          local host="${{ parameters.aiSearchName }}.search.windows.net"
          echo "=== Diagnostic réseau AI Search ==="
          echo "Host: $host"
          echo "Résolution DNS (getent):"
          getent hosts "$host" || true
          echo "Résolution DNS (nslookup):"
          nslookup "$host" 2>/dev/null || true
          echo "==================================="
        }
        
        echo "Création de l'index '${{ parameters.indexName }}'..."
        
        CURL_EXIT=0
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X PUT "$SEARCH_URL/indexes/${{ parameters.indexName }}?api-version=2024-07-01" \
          -H "Content-Type: application/json" \
          -H "api-key: $SEARCH_KEY" \
          -d '{
            "name": "${{ parameters.indexName }}",
            "fields": [
              {"name": "id", "type": "Edm.String", "key": true, "searchable": false},
              {"name": "content", "type": "Edm.String", "searchable": true, "analyzer": "fr.microsoft"},
              {"name": "metadata_storage_path", "type": "Edm.String", "searchable": false, "filterable": true},
              {"name": "metadata_storage_name", "type": "Edm.String", "searchable": true, "filterable": true},
              {"name": "metadata_storage_last_modified", "type": "Edm.DateTimeOffset", "filterable": true, "sortable": true},
              {"name": "metadata_content_type", "type": "Edm.String", "filterable": true},
              {"name": "sharepoint_item_id", "type": "Edm.String", "filterable": true},
              {"name": "sharepoint_last_modified", "type": "Edm.String", "filterable": true}
            ]
          }') || CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "❌ curl a échoué (exit code $CURL_EXIT) pendant la création de l'index"
          print_search_network_diagnostics
          exit "$CURL_EXIT"
        fi
        
        if [ "$HTTP_STATUS" == "201" ] || [ "$HTTP_STATUS" == "204" ]; then
          echo "✅ Index créé/mis à jour"
        else
          echo "❌ Erreur lors de la création de l'index (HTTP $HTTP_STATUS)"
          exit 1
        fi
