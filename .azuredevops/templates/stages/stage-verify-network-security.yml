# =============================================================================
# Stage Template : Vérifier que le durcissement réseau est en place
# =============================================================================
# Utilisé par le pipeline onboarding pour vérifier l'infrastructure sécurisée
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: networkResourceGroupName
    type: string
    default: ''
  - name: privateDnsResourceGroupName
    type: string
    default: ''
  - name: environment
    type: string
  - name: storageAccountName
    type: string
  - name: aiSearchName
    type: string
  - name: acrName
    type: string
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: VerifyNetworkSecurity
    displayName: '🔐 Vérifier durcissement réseau partagé'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: VerifyNetworkSecurityState
        displayName: 'Vérifier état sécurité réseau'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: '🔐 Vérifier VNet, subnet et Private Endpoints'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -euo pipefail

                RG="${{ parameters.resourceGroupName }}"
                NETWORK_RG="${{ parameters.networkResourceGroupName }}"
                DNS_RG="${{ parameters.privateDnsResourceGroupName }}"
                if [ -z "$NETWORK_RG" ]; then
                  NETWORK_RG="$RG"
                fi
                if [ -z "$DNS_RG" ]; then
                  DNS_RG="$NETWORK_RG"
                fi
                SUBNET_NAME="snet-companion-private-endpoints"
                case "${{ parameters.environment }}" in
                  dev)  VNET_NAME="vnet-gptrusted-dev"  ;;
                  nprd) VNET_NAME="vnet-gptrusted-nprd" ;;
                  prod) VNET_NAME="vnet-gptrusted-prod" ;;
                  *)    VNET_NAME="vnet-gptrusted-${{ parameters.environment }}" ;;
                esac

                VNET_COUNT=$(az network vnet list \
                  --query "length([?name=='$VNET_NAME'])" -o tsv)

                if [ "$VNET_COUNT" -eq 0 ]; then
                  echo "❌ VNet '$VNET_NAME' introuvable dans l'abonnement courant"
                  exit 1
                fi

                if [ "$VNET_COUNT" -gt 1 ]; then
                  echo "❌ Plusieurs VNets nommés '$VNET_NAME' trouvés dans l'abonnement courant"
                  exit 1
                fi

                VNET_RG=$(az network vnet list \
                  --query "[?name=='$VNET_NAME']|[0].resourceGroup" -o tsv)
                STORAGE_NAME="${{ parameters.storageAccountName }}"
                SEARCH_NAME="${{ parameters.aiSearchName }}"
                ACR_NAME="${{ parameters.acrName }}"
                SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                VNET_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$VNET_RG/providers/Microsoft.Network/virtualNetworks/$VNET_NAME"
                ACR_SKU=$(az acr show \
                  --name "$ACR_NAME" \
                  --resource-group "$RG" \
                  --query sku.name -o tsv 2>/dev/null || echo "unknown")

                echo "============================================================"
                echo "        VÉRIFICATION DURCISSEMENT RÉSEAU PARTAGÉ"
                echo "============================================================"
                echo "Ressource Group (app): $RG"
                echo "Ressource Group (PE) : $NETWORK_RG"
                echo "Ressource Group (DNS): $DNS_RG"
                echo "VNet             : $VNET_NAME (RG: $VNET_RG)"
                echo "Subnet PE        : $SUBNET_NAME"
                echo "Storage Account  : $STORAGE_NAME"
                echo "AI Search        : $SEARCH_NAME"
                echo "ACR              : $ACR_NAME"
                echo ""

                ERRORS=0

                # Vérifier le VNet
                echo "=== Vérification Réseau ==="
                if az network vnet show --resource-group "$VNET_RG" --name "$VNET_NAME" >/dev/null 2>&1; then
                  echo "✅ VNet présent: $VNET_NAME"
                else
                  echo "❌ VNet ABSENT: $VNET_NAME"
                  ERRORS=$((ERRORS + 1))
                fi

                # Vérifier le subnet
                if az network vnet subnet show \
                  --resource-group "$VNET_RG" \
                  --vnet-name "$VNET_NAME" \
                  --name "$SUBNET_NAME" >/dev/null 2>&1; then
                  echo "✅ Subnet présent: $SUBNET_NAME"

                  SUBNET_POLICIES=$(az network vnet subnet show \
                    --resource-group "$VNET_RG" \
                    --vnet-name "$VNET_NAME" \
                    --name "$SUBNET_NAME" \
                    --query privateEndpointNetworkPolicies -o tsv 2>/dev/null || echo "unknown")

                  if [ "$SUBNET_POLICIES" = "Disabled" ]; then
                    echo "✅ Subnet policy private endpoint: Disabled"
                  else
                    echo "❌ Subnet policy private endpoint incorrecte: $SUBNET_POLICIES (attendu: Disabled)"
                    ERRORS=$((ERRORS + 1))
                  fi
                else
                  echo "❌ Subnet ABSENT: $SUBNET_NAME"
                  ERRORS=$((ERRORS + 1))
                fi

                echo ""
                echo "=== Vérification Accès Public ==="

                # Vérifier Storage
                STORAGE_PNA=$(az storage account show \
                  --name "$STORAGE_NAME" \
                  --resource-group "$RG" \
                  --query publicNetworkAccess -o tsv 2>/dev/null || echo "unknown")
                STORAGE_PNA_LC=$(echo "$STORAGE_PNA" | tr '[:upper:]' '[:lower:]')

                if [ "$STORAGE_PNA_LC" = "disabled" ]; then
                  echo "✅ Storage accès public fermé"
                else
                  echo "❌ Storage publicNetworkAccess: $STORAGE_PNA (attendu: Disabled)"
                  ERRORS=$((ERRORS + 1))
                fi

                # Vérifier AI Search
                SEARCH_PNA=$(az search service show \
                  --name "$SEARCH_NAME" \
                  --resource-group "$RG" \
                  --query publicNetworkAccess -o tsv 2>/dev/null || echo "unknown")
                SEARCH_PNA_LC=$(echo "$SEARCH_PNA" | tr '[:upper:]' '[:lower:]')

                if [ "$SEARCH_PNA_LC" = "disabled" ]; then
                  echo "✅ AI Search accès public fermé"
                else
                  echo "❌ AI Search publicNetworkAccess: $SEARCH_PNA (attendu: disabled)"
                  ERRORS=$((ERRORS + 1))
                fi

                # Vérifier ACR
                ACR_PUBLIC=$(az acr show \
                  --name "$ACR_NAME" \
                  --resource-group "$RG" \
                  --query publicNetworkAccess -o tsv 2>/dev/null || echo "unknown")
                ACR_PUBLIC_LC=$(echo "$ACR_PUBLIC" | tr '[:upper:]' '[:lower:]')

                if [ "$ACR_SKU" = "Premium" ] && [ "$ACR_PUBLIC_LC" = "disabled" ]; then
                  echo "✅ ACR accès public fermé (Premium)"
                elif [ "$ACR_SKU" = "Premium" ]; then
                  echo "❌ ACR publicNetworkAccess: $ACR_PUBLIC (attendu: disabled pour Premium)"
                  ERRORS=$((ERRORS + 1))
                else
                  echo "ℹ️  ACR non-Premium ($ACR_SKU): accès public toléré ($ACR_PUBLIC)"
                fi

                echo ""
                echo "=== Vérification Private Endpoints ==="

                # Vérifier Storage PE
                if az network private-endpoint show \
                  --resource-group "$NETWORK_RG" \
                  --name "pe-${STORAGE_NAME}-blob" >/dev/null 2>&1; then
                  echo "✅ Private Endpoint Storage présent"
                else
                  echo "❌ Private Endpoint Storage absent"
                  ERRORS=$((ERRORS + 1))
                fi

                # Vérifier AI Search PE
                if az network private-endpoint show \
                  --resource-group "$NETWORK_RG" \
                  --name "pe-${SEARCH_NAME}-search" >/dev/null 2>&1; then
                  echo "✅ Private Endpoint AI Search présent"
                else
                  echo "❌ Private Endpoint AI Search absent"
                  ERRORS=$((ERRORS + 1))
                fi

                # Vérifier ACR PE (si Premium)
                if [ "$ACR_SKU" = "Premium" ]; then
                  if az network private-endpoint show \
                    --resource-group "$NETWORK_RG" \
                    --name "pe-${ACR_NAME}-registry" >/dev/null 2>&1; then
                    echo "✅ Private Endpoint ACR présent (Premium)"
                  else
                    echo "❌ Private Endpoint ACR absent (Premium activé)"
                    ERRORS=$((ERRORS + 1))
                  fi
                else
                  echo "ℹ️  ACR non-Premium ($ACR_SKU): Private Endpoint non applicable"
                fi

                echo ""
                echo "=== Vérification DNS Privé ==="

                verify_private_dns_for_zone() {
                  local zone="$1"
                  local record_name="$2"
                  local label="$3"

                  local zone_rgs=""
                  local zone_rg=""
                  local linked=""
                  local record_ips=""

                  zone_rgs=$(az network private-dns zone list \
                    --query "[?name=='$zone'].resourceGroup" -o tsv 2>/dev/null || true)

                  if [ -z "$zone_rgs" ]; then
                    echo "❌ Zone DNS privée absente: $zone"
                    ERRORS=$((ERRORS + 1))
                    return
                  fi

                  if [ "$(echo "$zone_rgs" | sed '/^$/d' | wc -l | tr -d ' ')" -gt 1 ]; then
                    if echo "$zone_rgs" | grep -Fxq "$DNS_RG"; then
                      zone_rg="$DNS_RG"
                      echo "⚠️  Plusieurs zones privées détectées pour '$zone' (zone retenue: $zone_rg)"
                    else
                      echo "❌ Plusieurs zones privées détectées pour '$zone' sans zone dans le RG DNS attendu '$DNS_RG'"
                      echo "$zone_rgs"
                      ERRORS=$((ERRORS + 1))
                      return
                    fi
                  fi

                  if [ -z "$zone_rg" ]; then
                    zone_rg=$(echo "$zone_rgs" | head -n 1)
                  fi

                  linked=$(az network private-dns link vnet list \
                    --resource-group "$zone_rg" \
                    --zone-name "$zone" \
                    --query "[?virtualNetwork.id=='$VNET_ID'].name | [0]" -o tsv 2>/dev/null || true)

                  if [ -z "$linked" ]; then
                    echo "❌ Zone '$zone' non liée au VNet '$VNET_NAME' (zone RG: $zone_rg)"
                    ERRORS=$((ERRORS + 1))
                  else
                    echo "✅ Zone '$zone' liée au VNet via '$linked' (RG: $zone_rg)"
                  fi

                  record_ips=$(az network private-dns record-set a show \
                    --resource-group "$zone_rg" \
                    --zone-name "$zone" \
                    --name "$record_name" \
                    --query "aRecords[].ipv4Address" -o tsv 2>/dev/null || true)

                  if [ -z "$record_ips" ]; then
                    echo "❌ Enregistrement A manquant: $record_name.$zone ($label)"
                    ERRORS=$((ERRORS + 1))
                  else
                    echo "✅ Enregistrement A présent: $record_name.$zone -> $record_ips"
                  fi
                }

                verify_private_dns_for_zone "privatelink.search.windows.net" "$SEARCH_NAME" "AI Search"
                verify_private_dns_for_zone "privatelink.blob.core.windows.net" "$STORAGE_NAME" "Storage Blob"

                if [ "$ACR_SKU" = "Premium" ]; then
                  verify_private_dns_for_zone "privatelink.azurecr.io" "$ACR_NAME" "ACR"
                fi

                echo ""
                if [ $ERRORS -eq 0 ]; then
                  echo "✅ Vérification réussie: Durcissement réseau conforme"
                  exit 0
                else
                  echo "❌ Vérification échouée: $ERRORS erreur(s) détectée(s)"
                  exit 1
                fi
