# =============================================================================
# Stage Template : Appliquer le durcissement réseau (progressif)
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: networkResourceGroupName
    type: string
    default: ''
  - name: privateDnsResourceGroupName
    type: string
    default: ''
  - name: location
    type: string
  - name: environment
    type: string
  - name: storageAccountName
    type: string
  - name: aiSearchName
    type: string
  - name: acrName
    type: string
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: ApplyNetworkSecurity
    displayName: '🔐 Durcissement réseau (optionnel)'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: HardenSharedInfra
        displayName: 'Appliquer la sécurité réseau partagée'
        pool:
          name: gptrusted-${{ parameters.environment }}
        steps:
          - task: AzureCLI@2
            displayName: '🔐 Private Endpoints + fermeture accès public (sauf monitoring et Container Apps)'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -euo pipefail

                RG="${{ parameters.resourceGroupName }}"
                NETWORK_RG="${{ parameters.networkResourceGroupName }}"
                DNS_RG="${{ parameters.privateDnsResourceGroupName }}"
                if [ -z "$NETWORK_RG" ]; then
                  NETWORK_RG="$RG"
                fi
                if [ -z "$DNS_RG" ]; then
                  DNS_RG="$NETWORK_RG"
                fi
                LOC="${{ parameters.location }}"
                SUBNET_NAME="snet-companion-private-endpoints"

                case "${{ parameters.environment }}" in
                  dev)  VNET_NAME="vnet-gptrusted-dev"  ;;
                  nprd) VNET_NAME="vnet-gptrusted-nprd" ;;
                  prod) VNET_NAME="vnet-gptrusted-prod" ;;
                  *)    VNET_NAME="vnet-gptrusted-${{ parameters.environment }}" ;;
                esac

                VNET_COUNT=$(az network vnet list \
                  --query "length([?name=='$VNET_NAME'])" -o tsv)

                if [ "$VNET_COUNT" -eq 0 ]; then
                  echo "❌ VNet '$VNET_NAME' introuvable dans l'abonnement courant."
                  exit 1
                fi

                if [ "$VNET_COUNT" -gt 1 ]; then
                  echo "❌ Plusieurs VNets nommés '$VNET_NAME' trouvés."
                  echo "   Corrigez les doublons pour permettre une sélection non ambiguë."
                  exit 1
                fi

                VNET_RG=$(az network vnet list \
                  --query "[?name=='$VNET_NAME']|[0].resourceGroup" -o tsv)

                SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                STORAGE_NAME="${{ parameters.storageAccountName }}"
                SEARCH_NAME="${{ parameters.aiSearchName }}"
                ACR_NAME="${{ parameters.acrName }}"

                # IDs complets pour les opérations cross-RG
                SUBNET_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$VNET_RG/providers/Microsoft.Network/virtualNetworks/$VNET_NAME/subnets/$SUBNET_NAME"
                VNET_ID="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$VNET_RG/providers/Microsoft.Network/virtualNetworks/$VNET_NAME"

                echo "============================================================"
                echo "        DURCISSEMENT RÉSEAU"
                echo "============================================================"
                echo "Resource Group (app) : $RG"
                echo "Resource Group (PE)  : $NETWORK_RG"
                echo "Subscription         : $SUBSCRIPTION_ID"
                echo "VNet                 : $VNET_NAME (RG: $VNET_RG)"
                echo "Subnet PE            : $SUBNET_NAME"
                echo "RG DNS privés        : $DNS_RG"
                echo ""

                # ----------------------------------------------------------------
                # Récupération des IDs des ressources
                # ----------------------------------------------------------------
                STORAGE_ID=$(az storage account show \
                  --name "$STORAGE_NAME" \
                  --resource-group "$RG" \
                  --query id -o tsv)

                SEARCH_ID=$(az search service show \
                  --name "$SEARCH_NAME" \
                  --resource-group "$RG" \
                  --query id -o tsv)

                ACR_ID=$(az acr show \
                  --name "$ACR_NAME" \
                  --resource-group "$RG" \
                  --query id -o tsv)

                ACR_SKU=$(az acr show \
                  --name "$ACR_NAME" \
                  --resource-group "$RG" \
                  --query sku.name -o tsv)

                # ----------------------------------------------------------------
                # Audit exposition réseau
                # ----------------------------------------------------------------
                print_audit() {
                  STORAGE_PNA=$(az storage account show \
                    --name "$STORAGE_NAME" \
                    --resource-group "$RG" \
                    --query "publicNetworkAccess || networkRuleSet.defaultAction" \
                    -o tsv 2>/dev/null || echo "unknown")

                  SEARCH_PNA=$(az search service show \
                    --name "$SEARCH_NAME" \
                    --resource-group "$RG" \
                    --query publicNetworkAccess -o tsv 2>/dev/null || echo "unknown")

                  ACR_PUBLIC=$(az acr show \
                    --name "$ACR_NAME" \
                    --resource-group "$RG" \
                    --query publicNetworkAccess -o tsv 2>/dev/null || echo "unknown")

                  echo "=== Audit exposition réseau ==="
                  echo "Storage publicNetworkAccess : ${STORAGE_PNA:-non défini}"
                  echo "AI Search publicNetworkAccess: $SEARCH_PNA"
                  echo "ACR publicNetworkAccess     : $ACR_PUBLIC"
                  echo ""
                }

                # ----------------------------------------------------------------
                # Vérification VNet
                # ----------------------------------------------------------------
                ensure_vnet() {
                  if az network vnet show \
                    --resource-group "$VNET_RG" \
                    --name "$VNET_NAME" >/dev/null 2>&1; then
                    echo "✅ VNet présent: $VNET_NAME (RG: $VNET_RG)"
                  else
                    echo "❌ VNet '$VNET_NAME' introuvable dans le RG '$VNET_RG'."
                    exit 1
                  fi
                }

                # ----------------------------------------------------------------
                # Vérification Subnet + activation private endpoint policies
                # ----------------------------------------------------------------
                ensure_subnet() {
                  if az network vnet subnet show \
                    --resource-group "$VNET_RG" \
                    --vnet-name "$VNET_NAME" \
                    --name "$SUBNET_NAME" >/dev/null 2>&1; then
                    echo "✅ Subnet présent: $SUBNET_NAME"
                  else
                    echo "❌ Subnet '$SUBNET_NAME' introuvable dans le VNet '$VNET_NAME'."
                    exit 1
                  fi

                  az network vnet subnet update \
                    --resource-group "$VNET_RG" \
                    --vnet-name "$VNET_NAME" \
                    --name "$SUBNET_NAME" \
                    --disable-private-endpoint-network-policies true \
                    --only-show-errors >/dev/null
                }

                # ----------------------------------------------------------------
                # Zone DNS privée (idempotent)
                # ----------------------------------------------------------------
                ensure_private_dns_zone() {
                  local zone="$1"
                  local all_zone_rgs=""
                  local count="0"
                  all_zone_rgs=$(az network private-dns zone list \
                    --query "[?name=='$zone'].resourceGroup" \
                    -o tsv 2>/dev/null || true)

                  if [ -n "$all_zone_rgs" ]; then
                    count=$(echo "$all_zone_rgs" | sed '/^$/d' | wc -l | tr -d ' ')
                  fi

                  if [ "$count" -eq 0 ]; then
                    echo "Création zone DNS privée: $zone (RG: $DNS_RG)"
                    az network private-dns zone create \
                      --resource-group "$DNS_RG" \
                      --name "$zone" \
                      --only-show-errors >/dev/null
                    echo "$DNS_RG"
                    return 0
                  fi

                  if [ "$count" -eq 1 ]; then
                    echo "$all_zone_rgs" | head -n 1
                    return 0
                  fi

                  if echo "$all_zone_rgs" | grep -Fxq "$DNS_RG"; then
                    echo "⚠️  Plusieurs zones privées '$zone' détectées. Zone retenue: $DNS_RG"
                    echo "$DNS_RG"
                    return 0
                  fi

                  echo "❌ Plusieurs zones privées '$zone' détectées sans zone dans le RG attendu '$DNS_RG'."
                  echo "   Zones trouvées:"
                  echo "$all_zone_rgs"
                  return 1
                }

                # ----------------------------------------------------------------
                # Lien VNet ↔ Zone DNS (idempotent)
                # FIX: on cherche dans TOUS les RGs de l'abonnement qui hébergent
                #      une zone du même nom, car le lien peut exister dans un RG
                #      différent de $DNS_RG (ex: rg-gptrusted-dev).
                #      Sans ce fix, on ne détectait pas le lien existant et Azure
                #      retournait "overlapping namespaces" à la recréation.
                # ----------------------------------------------------------------
                ensure_private_dns_link() {
                  local zone="$1"
                  local zone_rg="$2"
                  local link_name="link-${zone//./-}"

                  EXISTING_LINK=$(az network private-dns link vnet list \
                    --resource-group "$zone_rg" \
                    --zone-name "$zone" \
                    --query "[?virtualNetwork.id=='$VNET_ID'].name | [0]" \
                    -o tsv 2>/dev/null || true)

                  if [ -n "$EXISTING_LINK" ]; then
                    echo "⏭️  Lien DNS déjà présent pour $zone (RG: $zone_rg) → $EXISTING_LINK"
                  else
                    echo "Création lien DNS: $link_name (zone RG: $zone_rg)"
                    az network private-dns link vnet create \
                      --resource-group "$zone_rg" \
                      --zone-name "$zone" \
                      --name "$link_name" \
                      --virtual-network "$VNET_ID" \
                      --registration-enabled false \
                      --only-show-errors >/dev/null
                  fi
                }

                # ----------------------------------------------------------------
                # Private Endpoint + DNS Zone Group (idempotent)
                # FIX 1: utilise SUBNET_ID complet pour le cross-RG
                # FIX 2: --private-dns-zone attend un resource ID, pas un nom
                # ----------------------------------------------------------------
                ensure_private_endpoint() {
                  local pe_name="$1"
                  local target_id="$2"
                  local group_id="$3"
                  local zone_name="$4"
                  local zone_rg="$5"
                  local dns_zone_id="/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$zone_rg/providers/Microsoft.Network/privateDnsZones/$zone_name"

                  if az network private-endpoint show \
                    --resource-group "$NETWORK_RG" \
                    --name "$pe_name" >/dev/null 2>&1; then
                    echo "⏭️  Private Endpoint déjà présent: $pe_name"
                  else
                    echo "Création Private Endpoint: $pe_name"
                    az network private-endpoint create \
                      --resource-group "$NETWORK_RG" \
                      --name "$pe_name" \
                      --location "$LOC" \
                      --subnet "$SUBNET_ID" \
                      --private-connection-resource-id "$target_id" \
                      --group-id "$group_id" \
                      --connection-name "${pe_name}-conn" \
                      --only-show-errors >/dev/null
                  fi

                  if az network private-endpoint dns-zone-group show \
                    --resource-group "$NETWORK_RG" \
                    --endpoint-name "$pe_name" \
                    --name "default" >/dev/null 2>&1; then
                    echo "⏭️  DNS zone group déjà présent pour: $pe_name"
                  else
                    echo "Association DNS privée pour: $pe_name"
                    az network private-endpoint dns-zone-group create \
                      --resource-group "$NETWORK_RG" \
                      --endpoint-name "$pe_name" \
                      --name "default" \
                      --private-dns-zone "$dns_zone_id" \
                      --zone-name "default" \
                      --only-show-errors >/dev/null
                  fi
                }

                # ================================================================
                # EXÉCUTION
                # ================================================================
                print_audit

                ensure_vnet
                ensure_subnet

                # --- Storage Blob ---
                BLOB_ZONE_RG=$(ensure_private_dns_zone "privatelink.blob.core.windows.net" | tail -n 1)
                ensure_private_dns_link "privatelink.blob.core.windows.net" "$BLOB_ZONE_RG"
                ensure_private_endpoint \
                  "pe-${STORAGE_NAME}-blob" \
                  "$STORAGE_ID" \
                  "blob" \
                  "privatelink.blob.core.windows.net" \
                  "$BLOB_ZONE_RG"

                # --- AI Search ---
                SEARCH_ZONE_RG=$(ensure_private_dns_zone "privatelink.search.windows.net" | tail -n 1)
                ensure_private_dns_link "privatelink.search.windows.net" "$SEARCH_ZONE_RG"
                ensure_private_endpoint \
                  "pe-${SEARCH_NAME}-search" \
                  "$SEARCH_ID" \
                  "searchService" \
                  "privatelink.search.windows.net" \
                  "$SEARCH_ZONE_RG"

                # --- ACR (Premium uniquement) ---
                ACR_PRIVATE_READY="false"
                if [ "$ACR_SKU" = "Premium" ]; then
                  ACR_ZONE_RG=$(ensure_private_dns_zone "privatelink.azurecr.io" | tail -n 1)
                  ensure_private_dns_link "privatelink.azurecr.io" "$ACR_ZONE_RG"
                  ensure_private_endpoint \
                    "pe-${ACR_NAME}-registry" \
                    "$ACR_ID" \
                    "registry" \
                    "privatelink.azurecr.io" \
                    "$ACR_ZONE_RG"
                  ACR_PRIVATE_READY="true"
                else
                  echo "⚠️  ACR SKU=$ACR_SKU: Private Endpoint non supporté (Premium requis)."
                fi

                # ================================================================
                # Fermeture des accès publics
                # ================================================================
                echo ""
                echo "Fermeture des accès publics sur Storage et AI Search..."

                az storage account update \
                  --name "$STORAGE_NAME" \
                  --resource-group "$RG" \
                  --public-network-access Disabled \
                  --default-action Deny \
                  --allow-blob-public-access false \
                  --only-show-errors >/dev/null

                az search service update \
                  --name "$SEARCH_NAME" \
                  --resource-group "$RG" \
                  --public-network-access disabled \
                  --only-show-errors >/dev/null

                if [ "$ACR_PRIVATE_READY" = "true" ]; then
                  echo "Fermeture de l'accès public ACR..."
                  az acr update \
                    --name "$ACR_NAME" \
                    --resource-group "$RG" \
                    --public-network-enabled false \
                    --only-show-errors >/dev/null
                else
                  echo "⚠️  ACR conserve l'accès public (SKU non Premium)."
                fi

                echo ""
                echo "✅ Durcissement réseau terminé"
                echo "ℹ️  Monitoring (Log Analytics/App Insights) laissé public selon la politique demandée."
                echo "ℹ️  Container Apps non modifié selon l'exception demandée."
                echo ""
                print_audit