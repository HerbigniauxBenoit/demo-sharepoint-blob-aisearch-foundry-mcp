# =============================================================================
# Stage Template : Créer les ressources de monitoring
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: location
    type: string
  - name: logAnalyticsName
    type: string
  - name: appInsightsName
    type: string
  - name: environment
    type: string
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: CreateMonitoring
    displayName: '📊 Créer Monitoring'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: CreateLogAnalytics
        displayName: 'Créer Log Analytics'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: '📊 az monitor log-analytics workspace create'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                if az monitor log-analytics workspace show --resource-group "${{ parameters.resourceGroupName }}" --workspace-name "${{ parameters.logAnalyticsName }}" &>/dev/null; then
                  echo "ℹ️  Log Analytics Workspace '${{ parameters.logAnalyticsName }}' existe déjà, mise à jour des tags"

                  az monitor log-analytics workspace update \
                    --resource-group "${{ parameters.resourceGroupName }}" \
                    --workspace-name "${{ parameters.logAnalyticsName }}" \
                    --set tags.environment="${{ parameters.environment }}" \
                    --only-show-errors

                  echo "✅ Log Analytics Workspace déjà existant (tags mis à jour)"
                else
                  echo "Création du Log Analytics Workspace..."

                  az monitor log-analytics workspace create \
                    --resource-group "${{ parameters.resourceGroupName }}" \
                    --workspace-name "${{ parameters.logAnalyticsName }}" \
                    --location "${{ parameters.location }}" \
                    --retention-time 30 \
                    --tags \
                      environment="${{ parameters.environment }}"

                  echo "✅ Log Analytics Workspace créé"
                fi

      - job: CreateAppInsights
        displayName: 'Créer Application Insights'
        dependsOn: CreateLogAnalytics
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: '🔍 az monitor app-insights component create'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Récupération de l'ID du Log Analytics Workspace..."
                
                LAW_ID=$(az monitor log-analytics workspace show \
                  --resource-group "${{ parameters.resourceGroupName }}" \
                  --workspace-name "${{ parameters.logAnalyticsName }}" \
                  --query id -o tsv)
                
                if az monitor app-insights component show --app "${{ parameters.appInsightsName }}" --resource-group "${{ parameters.resourceGroupName }}" &>/dev/null; then
                  echo "ℹ️  Application Insights '${{ parameters.appInsightsName }}' existe déjà, mise à jour des tags"

                  az monitor app-insights component update \
                    --app "${{ parameters.appInsightsName }}" \
                    --resource-group "${{ parameters.resourceGroupName }}" \
                    --set tags.environment="${{ parameters.environment }}" \
                    --only-show-errors

                  echo "✅ Application Insights déjà existant (tags mis à jour)"
                else
                  echo "Création d'Application Insights..."

                  az monitor app-insights component create \
                    --app "${{ parameters.appInsightsName }}" \
                    --resource-group "${{ parameters.resourceGroupName }}" \
                    --location "${{ parameters.location }}" \
                    --kind web \
                    --application-type web \
                    --workspace "$LAW_ID" \
                    --tags \
                      environment="${{ parameters.environment }}"

                  echo "✅ Application Insights créé"
                fi
