# =============================================================================
# Stage Template : Configurer Azure AI Search
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: networkResourceGroupName
    type: string
  - name: privateDnsResourceGroupName
    type: string
  - name: aiSearchName
    type: string
  - name: storageAccountName
    type: string
  - name: dataSourceName
    type: string
  - name: indexName
    type: string
  - name: indexerName
    type: string
  - name: containerName
    type: string
  - name: companionName
    type: string
  - name: environment
    type: string
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: ConfigureAISearch
    displayName: '🔎 4. Configurer AI Search'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: CreateDataSource
        displayName: '4.1 Créer Data Source'
        pool:
          name: gptrusted-${{ parameters.environment }}
        steps:
          - template: ../steps/step-verify-private-dns-search.yml
            parameters:
              azureSubscription: ${{ parameters.azureSubscription }}
              resourceGroupName: ${{ parameters.resourceGroupName }}
              networkResourceGroupName: ${{ parameters.networkResourceGroupName }}
              privateDnsResourceGroupName: ${{ parameters.privateDnsResourceGroupName }}
              environment: ${{ parameters.environment }}
              aiSearchName: ${{ parameters.aiSearchName }}

          - template: ../steps/step-create-ai-search-datasource.yml
            parameters:
              azureSubscription: ${{ parameters.azureSubscription }}
              resourceGroupName: ${{ parameters.resourceGroupName }}
              networkResourceGroupName: ${{ parameters.networkResourceGroupName }}
              aiSearchName: ${{ parameters.aiSearchName }}
              storageAccountName: ${{ parameters.storageAccountName }}
              dataSourceName: ${{ parameters.dataSourceName }}
              containerName: ${{ parameters.containerName }}
              companionName: ${{ parameters.companionName }}

      - job: CreateIndex
        displayName: '4.2 Créer Index'
        dependsOn: CreateDataSource
        pool:
          name: gptrusted-${{ parameters.environment }}
        steps:
          - template: ../steps/step-create-ai-search-index.yml
            parameters:
              azureSubscription: ${{ parameters.azureSubscription }}
              resourceGroupName: ${{ parameters.resourceGroupName }}
              networkResourceGroupName: ${{ parameters.networkResourceGroupName }}
              aiSearchName: ${{ parameters.aiSearchName }}
              indexName: ${{ parameters.indexName }}

      - job: CreateIndexer
        displayName: '4.3 Créer Indexer'
        dependsOn: CreateIndex
        pool:
          name: gptrusted-${{ parameters.environment }}
        steps:
          - template: ../steps/step-create-ai-search-indexer.yml
            parameters:
              azureSubscription: ${{ parameters.azureSubscription }}
              resourceGroupName: ${{ parameters.resourceGroupName }}
              networkResourceGroupName: ${{ parameters.networkResourceGroupName }}
              aiSearchName: ${{ parameters.aiSearchName }}
              indexerName: ${{ parameters.indexerName }}
              dataSourceName: ${{ parameters.dataSourceName }}
              indexName: ${{ parameters.indexName }}
