# =============================================================================
# Stage Template : Validation des paramètres d'onboarding
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: environment
    type: string
  - name: companionName
    type: string
  - name: sharedResourceGroupName
    type: string
  - name: storageAccountName
    type: string
  - name: aiSearchName
    type: string
  - name: containerAppsEnvName
    type: string
  - name: appInsightsName
    type: string
  - name: containerAppName
    type: string
  - name: managedIdentityName
    type: string
  - name: blobContainerName
    type: string
  - name: aiSearchIndexName
    type: string
  - name: acrName
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: sharepointSiteUrl
    type: string
  - name: sharepointDriveName
    type: string
  - name: sharepointFolderPath
    type: string
  - name: syncSchedule
    type: string
  - name: deleteOrphanedBlobs
    type: string
  - name: syncPermissions
    type: string

stages:
  - stage: Validation
    pool: gptrusted-${{ parameters.environment }}
    displayName: '✅ 1. Validation'
    jobs:
      - job: ValidateParameters
        displayName: 'Valider les paramètres'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - bash: |
              echo "================================================"
              echo "        ONBOARDING COMPAGNON - VALIDATION       "
              echo "================================================"
              echo ""
              echo "=== Identification ==="
              echo "Compagnon        : ${{ parameters.companionName }}"
              echo "Environnement    : ${{ parameters.environment }}"
              echo ""
              echo "=== SharePoint (Source) ==="
              echo "Site URL         : ${{ parameters.sharepointSiteUrl }}"
              echo "Drive            : ${{ parameters.sharepointDriveName }}"
              echo "Folder           : ${{ parameters.sharepointFolderPath }}"
              echo ""
              echo "=== Configuration Sync ==="
              echo "Schedule         : ${{ parameters.syncSchedule }}"
              echo "Delete orphans   : ${{ parameters.deleteOrphanedBlobs }}"
              echo "Sync permissions : ${{ parameters.syncPermissions }}"
              echo ""
              echo "=== Image Docker ==="
              echo "Image            : ${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:${{ parameters.imageTag }}"
              echo ""
              echo "=== Ressources à créer ==="
              echo "RG partagé       : ${{ parameters.sharedResourceGroupName }}"
              echo "MSI              : ${{ parameters.managedIdentityName }}"
              echo "Container App    : ${{ parameters.containerAppName }}"
              echo "Blob Container   : ${{ parameters.blobContainerName }}"
              echo "AI Search Index  : ${{ parameters.aiSearchIndexName }}"
              echo ""
            displayName: '📋 Afficher les paramètres'

          - bash: |
              set -euo pipefail

              if [[ ! "${{ parameters.environment }}" =~ ^(dev|nprd|prod)$ ]]; then
                echo "❌ ERREUR: environnement invalide '${{ parameters.environment }}'"
                exit 1
              fi

              if [[ ! "${{ parameters.companionName }}" =~ ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$ ]]; then
                echo "❌ ERREUR: companionName doit être en minuscules, chiffres et tirets, sans tiret au début ou à la fin"
                exit 1
              fi

              CONTAINER_APP_NAME="${{ parameters.containerAppName }}"
              if [ ${#CONTAINER_APP_NAME} -gt 32 ]; then
                echo "❌ ERREUR: le nom de Container App '$CONTAINER_APP_NAME' dépasse 32 caractères"
                echo "   → Réduisez companionName pour respecter la limite Azure Container Apps"
                exit 1
              fi

              echo "✅ Validation des conventions de nommage réussie"
            displayName: '🧪 Valider les conventions de nommage'

          - template: ../steps/step-verify-shared-resources.yml
            parameters:
              azureSubscription: ${{ parameters.azureSubscription }}
              sharedResourceGroupName: ${{ parameters.sharedResourceGroupName }}
              storageAccountName: ${{ parameters.storageAccountName }}
              aiSearchName: ${{ parameters.aiSearchName }}
              containerAppsEnvName: ${{ parameters.containerAppsEnvName }}
              appInsightsName: ${{ parameters.appInsightsName }}

          - task: AzureCLI@2
            displayName: '🐳 Vérifier l''image ACR'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Vérification de l'image dans ACR..."

                if ! az acr show --name "${{ parameters.acrName }}" &>/dev/null; then
                  echo "❌ ERREUR: ACR '${{ parameters.acrName }}' introuvable"
                  exit 1
                fi

                if ! az acr repository show \
                  --name "${{ parameters.acrName }}" \
                  --image "${{ parameters.imageName }}:${{ parameters.imageTag }}" &>/dev/null; then
                  echo "❌ ERREUR: Image '${{ parameters.imageName }}:${{ parameters.imageTag }}' absente dans '${{ parameters.acrName }}'"
                  echo "   → Publiez d'abord l'image dans ACR ou corrigez le tag imageTag"
                  exit 1
                fi

                echo "✅ Image trouvée: ${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:${{ parameters.imageTag }}"

          - task: AzureCLI@2
            displayName: '🔍 Vérifier si la Container App existe déjà'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                if az containerapp show \
                    --name "${{ parameters.containerAppName }}" \
                    --resource-group "${{ parameters.sharedResourceGroupName }}" &>/dev/null; then
                  echo "ℹ️  Container App '${{ parameters.containerAppName }}' existe déjà -> le déploiement sera ignoré"
                else
                  echo "✅ Container App n'existe pas encore (création)"
                fi