# =============================================================================
# Stage Template : Préparer le réseau (VNet existant + subnet Private Endpoints)
# =============================================================================
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: environment
    type: string
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: CreateNetwork
    displayName: '🌐 Créer réseau partagé'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: CreateSharedNetwork
        displayName: 'Créer subnet Private Endpoints sur VNet existant'
        pool:
          name: gptrusted-${{ parameters.environment }}
        steps:
          - task: AzureCLI@2
            displayName: '🌐 az network vnet/subnet'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -euo pipefail

                RG="${{ parameters.resourceGroupName }}"
                SUBNET_NAME="snet-companion-private-endpoints"
                SUBNET_CIDR="10.26.140.64/26"

                case "${{ parameters.environment }}" in
                  dev)  VNET_NAME="vnet-gptrusted-dev"  ;;
                  nprd) VNET_NAME="vnet-gptrusted-nprd" ;;
                  prod) VNET_NAME="vnet-gptrusted-prod" ;;
                  *)    VNET_NAME="vnet-gptrusted-${{ parameters.environment }}" ;;
                esac

                VNET_COUNT=$(az network vnet list \
                  --query "length([?name=='$VNET_NAME'])" -o tsv)

                if [ "$VNET_COUNT" -eq 0 ]; then
                  echo "❌ VNet '$VNET_NAME' introuvable dans l'abonnement courant."
                  exit 1
                fi

                if [ "$VNET_COUNT" -gt 1 ]; then
                  echo "❌ Plusieurs VNets nommés '$VNET_NAME' trouvés."
                  echo "   Corrigez les doublons pour permettre une sélection non ambiguë."
                  exit 1
                fi

                VNET_RG=$(az network vnet list \
                  --query "[?name=='$VNET_NAME']|[0].resourceGroup" -o tsv)

                echo "✅ VNet existant trouvé: $VNET_NAME (RG: $VNET_RG)"

                if az network vnet subnet show \
                  --resource-group "$VNET_RG" \
                  --vnet-name "$VNET_NAME" \
                  --name "$SUBNET_NAME" >/dev/null 2>&1; then
                  echo "ℹ️  Subnet '$SUBNET_NAME' déjà présent"

                  CURRENT_SUBNET_CIDR=$(az network vnet subnet show \
                    --resource-group "$VNET_RG" \
                    --vnet-name "$VNET_NAME" \
                    --name "$SUBNET_NAME" \
                    --query "addressPrefix" -o tsv)

                  if [ -z "$CURRENT_SUBNET_CIDR" ] || [ "$CURRENT_SUBNET_CIDR" = "null" ]; then
                    CURRENT_SUBNET_CIDR=$(az network vnet subnet show \
                      --resource-group "$VNET_RG" \
                      --vnet-name "$VNET_NAME" \
                      --name "$SUBNET_NAME" \
                      --query "addressPrefixes[0]" -o tsv)
                  fi

                  if [ "$CURRENT_SUBNET_CIDR" != "$SUBNET_CIDR" ]; then
                    echo "❌ Le subnet '$SUBNET_NAME' existe avec la plage '$CURRENT_SUBNET_CIDR' (attendu: '$SUBNET_CIDR')."
                    exit 1
                  fi
                else
                  echo "Création du subnet '$SUBNET_NAME' ($SUBNET_CIDR)"

                  az network vnet subnet create \
                    --resource-group "$VNET_RG" \
                    --vnet-name "$VNET_NAME" \
                    --name "$SUBNET_NAME" \
                    --address-prefixes "$SUBNET_CIDR" \
                    --disable-private-endpoint-network-policies true \
                    --only-show-errors >/dev/null
                fi

                az network vnet subnet update \
                  --resource-group "$VNET_RG" \
                  --vnet-name "$VNET_NAME" \
                  --name "$SUBNET_NAME" \
                  --disable-private-endpoint-network-policies true \
                  --only-show-errors >/dev/null

                echo "✅ Réseau prêt: VNet existant '$VNET_NAME' / Subnet '$SUBNET_NAME' ($SUBNET_CIDR)"
